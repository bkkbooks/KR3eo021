body:
  text: 卷上原道統第一大哉醫乎其來遠矣粵自混飩既判洪荒始分陽之輕清者以氣而上浮為天陰之重濁者以形而下凝為地天隆然而位乎上地隤然而位乎下於是陽之精者為日東升而西墜陰之精者為月夜見而晝隱兩儀立矣二曜行焉於是玄氣凝空水始生也赤氣炫空火始生也蒼氣浮空木始生也素氣橫空金始生也黃氣際空土始生也五行備萬物生三才之道著矣是以惟人之生得天地之正氣也頭圓象天足方象地天有陰陽人有氣血天有五行人有五臟蓋葛天氏之民巢居穴處茹毛飲血動作以避其寒陰居以避其暑大朴未開何病之有逮夫伏羲氏占天望氣而畫卦後世有天元玉册目為伏羲之書者不知上古之時文字不立斯書何以而作也神農氏嘗百草一日而七十毒厥後本草興焉黃帝垂衣裳而天下治與岐伯天師更相問難上推天文下窮地理中極民瘼內經自此而作矣前乎此經之未作也民之有疾惟祝由而已後乎此經之既作也民之有疾必假砭針以治其外湯液以療其內厥後大朴散而風化開民務繁而欲心縱災沴多端非大毒小毒常毒無毒之藥弗能蠲矣醫之太原素問一書而已二十四卷八十一篇其間推原運氣之加臨闡明經絡之標本論病必歸其要處治各得其宜井然而有條粲然而不紊若天元紀大論六元正紀大論五常政大論氣交變大論至真要大論數篇乃至精至微之妙道誠萬世釋縛脫艱全真導氣拯黎元於仁壽濟羸劣以獲安者之大典也軒岐以下代不乏人扁鵲得其一二演而述難經皇甫士安次而為甲乙楊上善纂而為太素如全元起之解啓玄子之注所謂源潔則流清表端則形正歷代之明醫也獨有漢長沙太守張仲景者揣本求源探微賾隱取其大小奇偶之制定以君臣佐使之法而作醫方焉如桂枝湯麻黃湯大青龍湯小青龍湯論傷寒無汗為表實傷寒自汗為表虛表實者當發汗不可服桂枝表虛者當解肌不可服麻黃至於傷寒見風傷風見寒等證無汗者用以大青龍湯有汗者投以桂枝麻黃各半湯真千載不傳之祕乃大聖亞聖之資有繼往聖開來學之功也漢唐以下學者豈不欲涉其淵微之旨矧內經之理深幽無徑可入也如巢元方之作病源書孫思邈之作千金方蓋辭益繁而理愈昧方彌廣而法失真內經之書施用者鮮矣及朱奉議宗長沙太守之論編南陽活人之書仲景訓陰陽為表裡奉議解陰陽為寒熱差之毫釐如燼火之至微謬以千里如燎原之至惡其活人也固多其死人也不寡矣大哉守真之劉子乎要旨論原病式二書既作則內經之理昭如日月之明直格書宣明論二書既作則長沙之法約如樞機之要如改桂枝麻黃各半湯為雙解散變十棗湯為三花神祐丸其有功於聖門也不淺矣同時有張子和者出明內經之大道續河間之正源與麻知幾講學而作儒門事親之書乃曰吐中有汗瀉中有補聖人止有三法無第四者乃不易之確論至精之格言於是有劉張之派矣若東垣老人亦明素問之理亦宗仲景之法作濟生拔粹十書以傳於世是以有王道霸道譬焉明脈取權衡規矩用藥體升降浮沉知此則可入醫道矣經曰知其要者一言而終不知其要流散無窮又曰知一為下工知二為中工知三為上工上工者十全九中工者十全八下工者十全六此之謂也伏羲氏上古三皇中第一人也後世所傳有天元玉册神農氏上古三皇中第二人也後世所傳有本草一書黃帝氏上古三皇中第三人也有熊國君小典之子姓公孫都涿鹿之丘以土德王天下造指南之車殄滅蚩尤號曰軒轅黃帝與天師岐伯問答而作內經靈樞素問二書扁鵲盧國之醫姓秦名越人號扁鵲演八十一難經仲景漢長沙太守張機字仲景號曰長川公有傷寒論守真金河間人氏劉完素字守真號曰宗真子章宗皇帝三聘不起御賜高尚先生有內經運氣要旨論十萬余言素問玄機原病式一帙習醫要用直格書三卷醫方精要宣明論二帙子和金宛丘人氏張戴人是也有儒門事親書三十篇十形三療一帙治病百法一帙三復指迷一帙治法心要一帙三法六門世傳方一帙東垣元初人也李杲字明之號曰東垣老人乃易水張潔古老人之門生也有濟生拔粹十書標本運氣歌以下皆子和先生所作也少陽從本為相火太陰從中濕土坐厥陰從中火是家陽明從中濕是我太陽少陰標本從陰陽二氣相包裹風從火斷汗之宜燥與濕兼下之可萬病能將火濕分掣開軒岐無縫鎖尋十二經水火分冶肝膽由來從火治三焦包絡都無異脾胃常將濕處求肺與大腸同濕類腎與膀胱心小腸寒熱臨時旋商議惡寒表熱小膀溫惡熱表寒心腎熾十二經最端的四經屬火四經濕四經有熱有寒時攻裡解表細消息裡熱裡寒宜越竭表熱表寒宜汁釋濕同寒火同熱寒熱到頭無兩説六分熱來一分寒寒熱中停真浪舌熱寒格拒病機深亢則害承乃制則緊寒數熱脈正邪標本求之真妙訣休治風休治燥治得火時風燥了當解表時莫攻裡當攻裡時莫解表表裡如或兩可攻後先內外分多少治濕無過似決川此個筌蹄最分曉感謝軒岐萬世恩爭奈醯雞笑天小處治病如不是當年氣看與何年運氣同只向某年求活法方知都在至真中用藥不讀本草焉知藥性專殢藥性決不識病假饒識病未必得法識病得法工中之甲能窮素問病受何氣便知用藥當擇何味不誦十二經絡開口動手便錯不通五運六氣檢遍方書何濟經絡明認得標運氣明認得本求得標只取本治千人無一損道本一源派分三歧學明三法醫歸一理推運氣第二夫五運者金木水火土也六氣者風火暑濕燥寒也天干取運地支取氣天干有十配合則為五運地支十二對待則為六氣天氣始於甲地氣始於子天地相合則為甲子故甲子者干支之首也天氣終於癸地氣終於亥天地相合則為癸亥故癸亥者干支之末也陰陽相間剛柔相須是以甲子之後乙丑繼之壬戌之後癸亥繼之三十年為一紀六十年為一周太過不及斯皆見矣然以天干兄弟次序言之甲乙東方木也丙丁南方火也戊己中央土也庚辛西方金也壬癸北方水也以其夫婦配合言之甲與己合而化土乙與庚合而化金丙與辛合而化水丁與壬合而化木戊與癸合而化火故甲己之歲土運統之乙庚之歲金運統之丙辛之歲水運統之丁壬之歲木運統之戊癸之歲火運統之詩曰甲乙化土乙庚金丁壬木位盡成林丙辛便是長流水戊癸離宮號曰心然以地支循環之序言之寅卯屬春木也己午屬夏火也申酉屬秋金也亥子屬冬水也辰戌丑未屬四季土也以其對衝之位言之子對午而為少陰君火醜對未而為太陰濕土寅對申而為少陽相火卯對酉而為陽明燥金辰對戌而為太陽寒水己對亥而為厥陰風木故子午之歲君火主之丑未之歲濕土主之寅申之歲相火主之卯酉之歲燥金主之辰戌之歲寒水主之己亥之歲風木主之詩曰子午少陰君火暑丑未太陰濕土雨寅申少陽相火炎卯酉陽明燥金主辰戌太陽司水寒己亥厥陰風木舉然五運有主運有客運六氣有主氣有客氣主運主氣萬載而不易客運客氣每歲而迭遷然則客運也有太過焉有不及焉太過之年甲丙戊庚壬五陽干也不及之年謂乙丁己辛癸五陰乾也太過者其至先不及者其至後客氣也有正化焉有對化焉正化之歲謂午未寅酉辰亥之年也對化之歲謂子醜申卯戌己之年也正化者令之實對化者令之虛假令甲子年甲為土運統主一年子為君火專司一歲一期三百六十五日零二十五刻正合乎周天三百六十五度四分度之一也一期之中主運以位而相次於下客運以氣而周流於上主運者木為初之運火為第二運土為第三運金為第四運水為第五運客運者假如甲己年甲為土運初之運即土也土生金二之運即金也金生水三之運即水也水生木四之運即木也木生火五之運即火也每一運各主七十二日零五刻太過之年大寒前十三日交名曰先天不及之年大寒後十三日交名曰後天平氣之年正大寒日交名曰齊天一歲之內主氣定守於六位客氣循行於四時主氣者風為初之氣火為二之氣暑為三之氣濕為四之氣燥為五之氣寒為終之氣客氣者假令子午年少陰君火司天陽明燥金司地太陰濕土為天之左間厥陰風木為天之右間所以面南而命其位也太陽寒水為地之左間少陽相火為地之右間所謂面北而命其位也一氣在上一氣在下二氣在左二氣在右經曰天地者萬物之上下也左右者陰陽之道路也地之左間為初之氣天之右間為二之氣司天為三之氣天之左間為四之氣地之右間為五之氣司地為終之氣每一氣各王六十日八十七刻半有奇申子辰之年大寒日寅初一刻交初之氣至春分日子時之末交二之氣至小滿日亥時之末交三之氣至大暑日戌時之未交四之氣至秋分日酉時之末交五之氣至小雪日申時之末交終之氣所謂一六天也已酉醜之年大寒日已初一刻交初之氣至春分日卯時之末交二之氣至小滿日寅時之末交三之氣至大暑日丑時之末交四之氣至秋分日子時之末交五之氣至小雪日亥時之末交終之氣所謂二六天也寅午戌之年大寒日申初一刻交初之氣至春分日午時之末交二之氣至小滿日已時之末交三之氣至大暑日辰時之末交四之氣至秋分日卯時之末交五之氣至小雪日寅時之末交終之氣所謂三六天也亥卯未之年大寒日亥初一刻交初之氣至春分日酉時之末交二之氣至小滿日申時之末交三之氣至大暑日未時之末交四之氣至秋分日午時之末交五之氣至小雪日已時之未交終之氣所謂四六天也蓋因客運加於主運之上主氣臨於客氣之下天時所以不齊民病所由生也角音屬木丁壬化之丁陰木也壬陽木也丁為少角壬為太角木旺於春觸物而生有角之義也角者觸也徵音屬火戊癸化之戊陽火也癸陰火也戊為太徵癸為少徵火旺於夏物長已極有止之義也徵者止也宮音屬土甲己化之甲陽土也己陰土也甲為太宮己為少宮土旺於長夏位在中央有宮之義也宮者中也商音屬金乙庚化之乙陰金也庚陽金也乙為少商庚為太商金旺於秋萬物剛強有商之義也商者強也羽音屬水丙辛化之丙陽水也辛陰水也丙為太羽辛為少羽水旺於冬陽氣屈而陰氣伸有舒之義也羽者舒也假令子午年六氣如此余者以類推之在天之氣三年一降五年遷正司泉降極復升在地之氣三年一升五年遷正司天升極復降此圖言其六氣之定位也經有南政北政之説其六氣之布令也南政者面南布政以象君位嚮明而治北政者面北布政以象臣位聽君之令蓋六十年中十年南政余者皆北政也何以言之甲己之歲土也土為物之尊五行之主萬物非土無以生五行非土無以備貫統四時寄王四季故土運居中司天司泉之氣皆面南而處尊也余運居中司天司泉之氣皆面北而處卑也詩曰到者司天進四地陰陽上下定災危後學醫流如曉得逐年病體見根機此之謂也周天三百六十五度四分度之一以為期歲之數也故五日為一候三候為一氣二氣為一用六十日為一氣三月為一時四時為一歲經曰不知年之所加氣之盛衰虛實之所起不可以為工矣天符運氣相同曰天符戊子戊午戊寅年運氣皆火丙辰丙戌年運氣皆水己丑己未年運氣皆土乙卯乙酉年運氣皆金丁巳丁亥年運氣皆木六十年中有此十二年天符也順化天氣生運曰順化甲子甲午甲寅甲申年火下生土也壬辰壬戌年水下生木也乙丑乙未年土下生金也辛卯辛酉年金下生水也癸巳癸亥年木下生火也六十年中有此十二順化也天刑天氣克運曰天刑庚子庚午庚寅庚申年火下剋金也戊辰戊戌年水下剋火也辛丑辛未年土下剋水也丁卯丁酉年金下剋木也己巳己亥年木下剋土也六十年中有此十二年天刑也小逆運生天氣曰小逆壬子壬午壬寅壬申年木上生火也庚辰庚戌年金上生水也癸丑癸未年火上生土也己卯己酉年土上生金也辛巳辛亥年水上生木也子臨父位於理未當六十年中有此十二年小逆也不和運克天氣曰不和丙子丙午丙寅丙申年水上剋火也甲辰甲戌年土上剋水也辛丑辛未年水上剋土也癸卯癸酉年火上剋金也己巳己亥年金上剋木也六十年中有此十二年不和也歲會運臨木氣之位曰歲會子水位也丙子年水運臨之午火位也戊午年火運臨之卯木位也丁卯年木運臨之酉金位也乙酉年金運臨之辰戌丑未土位也甲辰甲戌己丑己未年土運臨之六十年中有此八年歲會也太乙天符天符歲會相合曰太乙天符戊午乙酉己未己丑六十年中有此四年太乙天符也支德符運與四孟月同曰支德符寅屬木春孟月也壬寅年木運臨之已屬火夏孟月也癸已年火運臨之申屬金秋孟月也庚申年金運臨之亥屬水冬孟月也辛亥年水運臨之六十年中有此四年支德符也干德符運與文同日相合曰干德符甲與己合乙與庚合丙與辛合丁與壬合戊與癸合一年遇此二干天地德合亦為平氣之歲也同天符太過之運加地氣曰同天符庚子庚午年運同司地燥金壬寅壬申年運同司地風木甲辰甲戌年運同司地濕土六十年中有此六年天符也同歲會不及之運加地氣曰同歲會辛丑辛未年運臨司地寒水癸卯癸酉年運臨司地君火癸巳癸亥年運臨司地相火六十年中有此六年同歲會也甲己土運加臨圖初之運甲太宮己少宮濕土加風木二之運乙少商庚太商燥金加熱火客三之運丙太羽辛少羽寒水加濕土運四之運丁少角壬太角風木加燥金五之運戊太徵癸少徵熱火加寒水乙庚金運加臨圖初之運乙少商庚太角燥金加風木二之運丙大羽辛少羽寒水加熱火客三之運丁少角壬太角風木加濕土運四之運戊太徵癸少徵熱火加燥金五之運甲太宮己少官濕土加寒水丙辛水運加臨圖初之運丙太羽辛少羽寒水加風木二之運丁少角壬太角風木加熱火客主三之運戊太徵癸少徵熱火加濕土運四之運己少宮甲太宮濕土加燥金五之運庚太商乙少商燥金加寒水丁壬水運加臨圖初之運丁少角壬太角風木加風木二之運戊太徵癸少徵熱火加熱火客三之運己少宮甲太宮濕土加濕土運四之運庚太商乙少商燥金加燥金五之運辛少羽丙太羽寒水加寒水戊癸火運加臨圖初之運戊太徵癸少徵熱火加風木二之運己少宮甲太宮濕土加熱火客主三之運庚太商乙少商燥金加濕土運地四之運辛少羽丙太羽寒水加燥金五之運壬少角丁太角風木加寒水子午之紀圖主氣萬載而不易主氣應地者靜初之氣太陽寒水天時流水復冰雪霜時降民病腹痛清厥風二之氣厥陰風木天時地起飄風民病眩冒火三之氣少陰君火天時炎熾大作民病疫癘盛行暑上下加臨主客勝負四之氣太陰濕土天時雨水淋淫民病濡瀉腫滿濕五之氣少陽相火天時涼風愆期民病瘧燥終之氣陽明燥金天時寒氣肅殺民病癥瘕火客氣一歲而一遷客氣應天者動丑未之紀圖主氣萬載而不易主氣應地者靜初之氣厥陰風木天時大風數舉云偃沙飛民病強直支痛夏戾筋縮風二之氣少陰君火天時暄熱民病血溢血泄火三之氣太陰濕土天時暑雨蒸溽民病黃疸暑上下加臨主客勝負四之氣少陽相火天時熱鬱淫雨民病瘧痢濕五之氣陽明燥金天時大涼民病咳逆燥終之氣太陽寒水天時大寒凜冽民病厥逆禁固寒客氣一歲而一遷客氣應天者動甲申之紀圖主氣萬載而不易主氣應地者靜初之氣少陰君火天時溫和風舉民病掉眩風二之氣太陰濕土天時雨降後暖民病溫熱之喘火三之氣少陽相火天時赤地炎蒸民病暴病暴死暑上下加臨主客勝負四之氣陽明燥金天時涼雨時降民病瘧腫濕五之氣太陽寒水天時霜降太涼民病鬱熱之疾燥終之氣厥陰風木天時雪霜風大起民病目疾赤腫寒客氣一歲而一遷客氣應天者動卯酉之紀圖主氣萬載而不易主氣應地者靜初之氣太陰濕土天時雨作風舉民病瀉腫眩暈風二之氣少陽相火天時溫熱民病疫癘大行火三之氣陽明燥金天時雨水愆期天氣燥熱民病癰腫暑上下加臨主客勝負四之氣太陽寒水天時雨雹不時民病泄瀉濕五之氣厥陰風木天時雲物不寧民病強直燥終之氣少陰君火天時雨雪愆期民病中熱寒客氣一歲而一遷客氣應天者動己亥之紀圖主氣萬載而不易主氣應地者靜初之氣少陽相火天時暄暖民病濕病風二之氣陽明燥金天時萬物乾燥民病諸熱之疾火三之氣太陽寒水天時熱鬱民病內熱暑上下加臨主客勝負四之氣厥陰風木天時風雨交作民病痹濕五之氣少陰君火天時涼風衍期草木晚凋民病瘡癢燥終之氣太陰濕土天時雨雪交作寒風凜冽民病痹厥寒客氣一歲而一遷客氣應天者動己亥之紀圖主氣萬載而不易主氣應地者靜初之氣陽明燥金天時草木晚發天氣反涼民病兩肋痛風二之氣太陽寒水天時天氣反寒民病鬱熱火三之氣厥陰風木天時風火交作民病眩暈嘔逆暑上下加臨主客勝負四之氣少陰君火天時蒸溽霖雨民病瀉痢濕五之氣太陰濕土天時淫潰民病瀉腫燥終之氣少陽相火天時蟄蟲將見流水不冰民病暴熱之疾寒客氣一歲而一遷客氣應天者動天五運六氣相摩相蕩上加下臨六十年之紀不能齊矣太過之紀有五木曰發生火曰赫曦土曰敦阜金曰堅成水曰流衍不及之紀有五木曰委和火曰伏明土曰卑監金曰從革水曰涸流平氣之紀有五木曰敷和火曰升明土曰備化金曰審平水曰靜順太過則乘己所勝而侮所不勝侮反受邪寡於畏也不及則勝己者來欺之子必為母復仇也發生之紀謂壬子壬午壬寅壬申壬辰壬戌六年也歲木太過風氣流行脾土受邪偃木飛沙草木早生歲星明見民病腹痛濡瀉飲食上支兩脅鬲咽不通胃脘當心而痛甚則忽忽眩冒巔疾赫曦之紀謂戊子戊午戊寅戊申四年也歲火太過熱氣流行肺金受邪陽炎沸騰山川赤地災惑星明見民病咳嗽喘逆肺痿寒熱血溢血泄甚則身熱膚痛敦阜之紀謂甲子甲午甲寅甲申甲辰甲戌六年也歲土太過濕氣流行腎水受邪淫雨水潦田牧土駒鎮星明見民病七疝鶩溏甚則腹大腫滿堅成之紀謂庚辰庚戌二年也歲金太過燥氣流行肝木受邪草木晚生不時霜降太白星明見民病脅痛善恐如人將捕之甚則皮膚皴揭流衍之紀謂丙子丙午丙寅丙申丙辰丙戌六年也歲水太過寒邪流行心火受邪雪霜凜冽水澤冰堅辰星明見民病心懸如病飢堅痞甚痛甚則厥逆禁固委和之紀謂丁丑丁未丁卯丁酉四年也歲木不及燥氣妄行肝反受邪草木晚生黃落調隕太白星光芒民病肋痛支滿復則火令大舉肺金受制民病喘逆唾血伏明之紀謂癸丑癸未癸卯癸酉四年也歲火不及寒氣妄行心反受邪雪霜時降寒氣凜冽辰星光芒民病吐利腥穢食已不飢復則濕令大舉腎水受制民病膝痛脛腫卑監之紀謂己卯己酉己巳己亥四年也歲土不及風氣妄行脾反受邪雨水愆期大風數舉歲星光芒民病胃脘當心而痛復則燥令大舉肝木受制民病脅痛從革之紀謂乙巳己亥二年也歲金不及熱氣妄行肺反受邪草木焦黃天暑地熱災惑星光芝民病肺痿寒熱咳血復則寒令大舉心火受制民病厥心痛涸流之紀謂辛丑辛未辛已辛亥四年也歲水不及濕氣妄行腎反受邪陰雨淋潰雪霜晚降鎮星光芒民病膝痛脛腫復則風令大舉脾土受制民病腹痛濡瀉敷和之紀謂丁巳丁亥二年也木本不及上逢天符助之得其平也氣化均民病少升明之紀謂戊辰戊戌二年也火本太過上逢天形克之減而得其平也癸巳癸亥二年火本不及上逢順化天氣生之助而得其平也氣化均民病少備化之紀謂己丑己未二年上逢太乙天符助之得其平也氣化均民病少審平之紀謂庚子庚午二年上逢君火庚寅庚申二年上逢相火天刑剋之減而得其平也乙丑己未二年上逢順化生之乙卯年逢天符乙酉年逢太乙天符助之得其平也氣化均民病少靜順之紀辛卯辛酉二年上逢順化生之得其平也氣化均民病少明形氣第三天人之有生也稟天地之陰陽假父母之精血交感凝結以為胞胎也乾道成男坤道成女始自襁褓以至髫齔逮其成童與夫壯年豈易然哉故一月之孕有白露之稱二月之胚有桃花之譬及其三月先生右腎則為男陰包陽也先生左腎則為女陽包陰也其次腎生脾脾生肝肝生肺肺生心以生其勝己者腎屬水故五臟由是為陰其次心生小腸小腸生大腸大腸生膽膽生胃胃生膀胱膀胱生三焦以生其己勝者小腸屬火六腑由是為陽其次三焦生八脈八脈生十二經十二經生十二絡十二絡生一百八十系絡系絡生一百八十纏絡纏絡生三萬四千孫絡孫絡生三百六十五骨節骨節生三百六十五大穴大穴生八萬四千毛竅則耳目口鼻四肢百骸之身皆備矣所謂四月形像具五月筋骨成六月毛髮生正謂此也至七月則遊其魂而能動左手八月遊其魄而能動右手九月三轉身十月滿足母子分解其中有延月生者必生貴子不足月日生者必主貧薄之人誕生之後有變蒸之熱長其精神壯其骨髓生其意智三十二日一變蒸生腎氣焉六十四日二變蒸生膀胱之氣焉腎與膀胱屬水其數一也九十六日三變蒸生心氣焉一百二十八日四變蒸生小腸之氣焉心與小腸屬火其數二也一百六十日五變蒸生肝氣焉一百九十二日六變蒸生膽氣焉肝與膽屬木其數三也二百二十四日七變蒸生肺氣焉二百五十六日八變蒸生大腸之氣焉肺與大腸屬金其數四也二百八十八日九變蒸生脾氣焉三百二十日十變蒸生胃氣焉脾與胃屬土其數五也變蒸已畢一期歲焉齒生髮長神智有異於前也故曰齒者骨之餘也發者血之餘也爪者筋之餘也神者氣之餘也籲人身之難得者如此哉方其幼也有如水面之泡草頭之露氣血未定易寒易熱腸胃綿脆易飢易飽為母者調攝不得其宜必不能免乎吐瀉驚疳之病矣及其長也嗜欲既開不能修養是以六氣迭侵於其外七情交戰於其中百憂纍其心萬事勞其形一蝸之氣安能無病焉小兒之瘡疹大人之傷寒尤其甚也所以黃帝問於岐伯曰余聞上古之人春秋皆度百歲而動作不衰今時之人年至半百而動作衰矣時世異耶人將失之耶岐伯對曰上古之人其知道者和於陰陽法於術數飲食有節起居有常不妄作勞故能形與神俱而盡終其天年度百歲乃去今時之人不然也以酒為漿以妄為常以欲竭其精以耗散其真不知持滿不時御神務快其心逆於生樂起居無節故半百而衰矣是故聖人不治已病治未病不治已亂治未亂夫病已成而後藥之亂已成而後治之譬猶渴而穿井鬥而鑄兵不亦晚乎五臟六腑之位五臟者心肝脾肺腎也六腑者小腸大腸膽胃膀胱三焦也肺最居上為諸臟之華蓋六葉兩耳主藏魄心在肺下其體半垂如未開蓮花上有七孔三毛主藏神心下為鬲鬲下有胃主藏水穀胃左有肝左三葉右四葉主藏魂膽在肝之短葉間有精汁三合胃右有脾主藏意胃下為腹大腸當臍右回十六曲小腸左回疊積十六曲主傳溲便二腸之下為臍臍下為膀胱主藏溺背脊骨節第七椎之下有二腎左者為腎主藏志右為命門主藏精故曰臟者藏也腑者聚也五臟六腑之官心者君主之官神明出焉肺者相傅之官治節出焉肝者將軍之官謀慮出焉腎者作強之官技巧出焉脾胃者倉廩之官五味出焉膽者中正之官決斷出焉膽中者臣使之官喜樂出焉小腸者受盛之官化物出焉大腸者傳道之官變化出焉膀胱者州都之官津液藏焉氣化則能出矣三焦者決瀆之官水道出焉凡此十二官者不得相失也主明則下安以此養生則壽沒世不殆以為天下則昌主不明則十二官危使道閉塞而不通以此養生則殃以為天下者其宗大危戒之戒之故曰心者一身之主宰萬事之根本也五臟之候目者肝之外候肝氣通於目目和則辨白黑矣鼻者肺之外候肺氣通於鼻鼻和則知香臭矣舌者心之外候心氣通於舌舌和則知五味矣口者脾之外候脾氣通於口口和則知穀味矣耳者腎之外候腎氣通於耳耳和則知五音矣五臟之竅東方青色入通於肝開竅於目南方赤色入通於心開竅於舌中央黃色入通於脾開竅於口西方白色入通於肺開竅於鼻北方黑色入通於腎開竅於耳及二陰故清陽出上竅及氣道呼吸之間濁陰出下竅乃便溺傳瀉之所五臟所生肺主聲入心為言入肺為呼入脾為歌入腎為呻吟自入為哭肝主色入肺為白入心為赤入脾為黃入腎為黑自入為青心主臭入肝為臊臭入肺為腥臭入脾為香臭入腎為腐臭自入為焦臭脾主味入心為苦入肝為酸入肺為辛入腎為咸自入為甘腎主液入心為汗入肝為淚入肺為涕入脾為涎自入為唾五臟所養肺養皮毛心養血脈脾養肌肉肝養筋膜腎養骨髓四海腦者髓之海也胸者氣之海也衝脈血之海也脾胃水穀之海也八溪肉之小會曰溪謂二肘二膝四腕也一谷肉之大會曰谷臀是也藏府配經絡圖周流氣血不已一經一絡各應陰陽之象水穀化精神圖十二經絡徑而直者為經支而橫者為絡手太陰之脈起於中焦下絡大腸還循胃口上膈屬肺從肺系橫出腋下下循臑內行少陰心主之前下肘中循臂內上骨下廉入寸口上循魚際出大指之端其支者從腕後直出次指內廉出其端次注手陽明手陽明之脈起於大指次指之端循指上廉出合谷兩骨之間上入兩筋之中循臂上廉入肘外廉上臑外前廉上肩出髃骨之前廉上出於柱骨之會上下入缺盆絡肺下膈屬大腸其支者從缺盆上頸貫頰下入下齒中還出俠口交人中左之右右之左上俠鼻孔次注足陽明足陽明之脈起於鼻交頞中傍約太陽之脈下循鼻外入上齒中還出俠口環唇下交承漿卻循頤後下廉出大迎循頰車上耳前過客主人循髮際至額顱其支者從大迎前下人迎循喉嚨入缺盆下膈屬胃絡脾其直者從缺盆下乳內廉下俠臍入氣街中其支者起於胃口下循腹裡下至氣街中而合以下髀關抵伏兔下膝臏中下循脛外廉下足跗入中指內間其支者下廉三寸而別下入中指外間其支者別跗上入大指間出其端次注足太陰足太陰之脈起於大指之端循指內側白肉際過核骨後上內踝前廉上腨內循脛骨後交出厥陰之前上膝股內前廉入腹屬脾絡胃上膈俠咽連舌本散舌下其支者復從胃別上膈注心中次注手少陰手少陰之脈起於心中出屬心系下膈絡小腸其支者從心系上俠咽系目系其直者後從心系卻上肺下出腋下下循臑內後廉行太陰心主之後下肘內循臂內後廉抵掌後鋭骨之端入掌內後廉循小指之內出其端次注手太陽手太陽之脈起於小指之端循手外側上腕出踝中直上循臂骨下廉出肘內側兩筋之間上循臑外後廉出肩解繞肩胛交肩上入缺盆絡心循咽下膈抵胃屬小腸其支者從缺盆循頸上頰至目鋭眥卻入耳中其支者別頰上䪼抵鼻至目內眥斜絡於顴次注足太陽足太陽之脈起於目內眥上額交巔其支者從巔至耳上角其直者從巔入絡腦還出別下項循肩髆內俠脊抵腰中入循膂絡腎屬膀胱其支者從腰中下俠脊貫臀入膕中其支者從髆內左右別下貫胛俠脊內過髀樞循髀外從後廉下合膕中以下貫踹內出外踝之後循京骨至小指外側次注足少陰足少陰之脈起於小指之下斜越足心出於然谷之下循內踝之後別入跟中以上踹內出膕內廉上股內後廉貫脊屬腎絡膀胱其直者從腎上貫肝膈入肺中循喉嚨俠舌本其支者從肺出絡心注胸中次注手厥陰手厥陰之脈起於胸中出屬心包下膈歷絡三焦其支者循胸出脅下腋三寸上抵腋下循臑內行太陰少陰之間入肘中循臂內入掌中循中指出其端其支者從掌中循小指次指出其端次注手少陽手少陽之脈起於小指次指之端上出兩指之間循手表腕出臂外兩骨之間上貫肘循臑外上肩交出足少陽之後入缺盆布膻中散絡心包下膈循屬三焦其支者從膻中上出缺盆上項系耳後直上出耳上角以屈下頰抵䪼其支者從耳後入耳中出走耳前過客主人前交頰至目鋭眥次注足少陽足少陽之脈起於目鋭眥上抵頭角下耳後循頸行手少陽之前至肩上卻交出手少陽之後入缺盆其支者從耳後入耳中出走耳前至目鋭眥之後其支者別鋭眥下大迎合於手少陽抵於䪼下加頰車下頸合缺盆以下胸中貫膈絡肝屬膽循脅裡出氣街繞毛際橫入髀厭中其直者從缺盆下腋循胸過季脅下合髀厭中以下循髀少陽出膝外廉下外輔骨之前直下抵絶骨之端下出外踝之前循足跗上入小指次指之間其支者別跗上入大指之間循大指岐骨內出其端還貫爪甲出三毛次注足厥陰足厥陰之脈起於大指叢毛之際上循足跗上廉去內踝一寸上踝八寸交出太陰之後上膕內廉循股陰入毛中過陰器抵小腹俠胃屬肝絡膽上貫膈布脅肋循喉嚨之後上入頏顙連目系上出額與督脈會於巔其支者從目系下頰裡環唇內其支者後從肝別貫膈上注肺次注手太陰奇經八脈督脈者起於下極之腧並於脊裡上至風府入屬於腦任脈者起於中極之下以上毛際循腹裡上關元至咽喉上頤循面入目絡舌衝脈者起於氣衝並足陽明之經俠臍上行至胸中而散帶脈者起於季脅回身一周陽蹻脈者起於跟中循外踝上行入風池陰蹻脈者亦起於跟中循內踝上行至咽喉交貫衝脈陽維起於諸陽之會陰維起於諸陰之交臟腑配五行圖五臟屬陰陽干為兄甲膽乙肝東方木丙小腸丁心南方火戊胃己脾中央土庚大腸辛肺西方金壬膀胱癸腎北方水六腑屬陽陰乾為弟相合而為表裡經絡配四時圖天非純陽亦有三陰天以陽生陰長而為春夏寅手少陽三焦經巳手厥陰心包絡經春卯手陽明大腸經生夏午手少陰心之經長絡應天手之經辰手太陽小腸經未手太陰肺之經天時十二月人身十二經地支十二位申足少陽膽之經亥足厥陰肝之經秋酉足陽明胃之經殺冬子足少陰腎之經藏絡應地足之經戌足太陽膀胱經醜足太陰脾之經地非純陰亦有三陽地以陽殺陰藏而為秋冬評脈法第四脈者何也莫非氣乎氣為衛衛行脈外莫非血乎血為榮榮行脈中然則脈之一字果何物乎嘗試原之必有説矣蓋人之妙軀渾然中處吾身之氣血即天地之陰陽也天地之陰陽所以一升一降者必有主宰者人身之氣血所以一周一轉者必有統銜者焉知此則知脈矣古之𮕟字從血從瓜所以使氣血各依分派而行經絡也今之脈字從月從永所以使肌肉以之長久而保天年也脈者有三一曰命之本二曰氣之神三曰形之道經所謂天和是矣至於折一肢瞽一目亦不能害生而脈不可須臾失矣失則絶命害生也春之生也吾之脈與天地之氣而同升夏之長也吾之脈與天地之氣而同浮秋之殺也吾之脈與天地之氣而同降冬之藏也吾之脈與天地之氣而同沉分而言之曰氣曰血曰脈總而言之唯脈運行氣血而已矣是以氣血盛則脈盛氣血衰則脈衰氣血和則脈平氣血亂則脈病氣血壯則脈大氣血微則脈小氣血熱則脈數氣血寒則脈遲長人則脈長短人則脈短性緊則脈緊性緩則脈緩室女尼冠則脈濡嬰兒稚子則脈急脈為氣血之體氣血乃脈之用也然則氣血能使脈之盛衰又得以致焉蓋因谷入於胃脈道乃行穀氣多則氣血榮昌脈亦盛矣穀氣少則氣血微弱脈亦衰矣故經曰四時以胃氣為本脈無胃氣則死矣論而至此脈之一字豈非太乙天真之元氣乎三部九候圖五行循環相生周而復始有如子母之親六部對待相剋左剛右柔有若夫婦之別三部者寸關尺也九候者浮中沉也寸應天為上部關應人為中部尺應地為下部一部之中各有浮中沉三候浮以象天中以象人沉以象地三三如九故曰三部九候也然則寸關尺之名何以言之蓋人手腕後高骨為關從關至魚際得同身之一寸故名曰寸部從關至尺澤穴得同身之一尺故名曰尺部寸部屬陽實得寸內九分陽數九也尺部屬陰實得尺內一寸陰數十也陽出陰入以關為界故名曰關部然則浮中沉之名何以取之蓋三部之中六府之脈常浮府屬陽也五藏之脈常沉藏屬陰也胃氣之脈常在沉浮之中胃為主藏六府之本也輕手診之為浮候重手診之為沉候不重不輕診之為中候故診法常以平旦陰氣未動陽氣未散飲食未進經脈未盛絡脈調勻氣血未亂乃可診之先令病人端身默坐為醫者當澄心息慮初以中指揣按高骨關位次下前後二指輕按消息之中按消息之重按消息之然他醉莫與診視自醉莫診他人或有病人遠來曾乘車而坐舟或騎驢而跨馬必待憩歇久之方與診視終不及平旦為準也然寸部以應上焦心肺居上也關部以應中焦肝脾居中也尺部以應下焦腎命居下也左寸心與小腸動脈之位君火也右寸肺與大腸動脈之位燥金也左關肝與膽動脈之位風木也右關脾與胃動脈之位濕土也左尺腎與膀胱動脈之位寒水也右尺命門與三焦動脈之位相火也然以循環之序言之則左尺水生左關木左關木生左寸火左寸火接右尺火右尺火生右關土右關土生右寸金右寸金生左尺水生生之意不絶有子母之親也然以對待之位言之則左寸火克右寸金左關木克右關土左尺水克右尺火左剛右柔有夫婦之別也然左手屬陽右手屬陰左寸君火以尊而在上右尺相火以卑而在下有君臣之道也三部之中有此自然之理學醫者不可不盡心乎四時平脈應天運圖天之陰陽左升而右降上浮而下沉所以為四時之序也人之氣血春升而秋降夏浮而冬沉所以為四時之脈也四時之序謂生長化收藏也四時之脈謂弦鉤緩毛石也春三月天氣溫和萬物發生肝經木旺脈來輕虛而滑端直以長故曰弦夏三月天氣暑熱萬物盛長心經火旺脈來盛去衰前屈後居故曰鉤秋三月天氣清涼萬物凋零肺經金旺脈來輕虛以浮故曰毛冬三月天氣凜冽萬物閉藏腎經水旺脈來沉濡而滑故曰石經曰春日浮如魚之在波夏日在膚泛泛乎萬物有餘秋日下膚蟄蟲將去冬日在骨蟄蟲周密君子居室以其脈應天地之運所以有規矩權衡之譬也應時而見曰太平過曰病不及曰病反時而見曰死謂春得秋脈秋得夏脈夏得冬脈冬得長夏脈長夏得春脈五行相剋鬼賊之脈見也脈有胃氣曰平故曰微弦微鉤微毛微石五臟兼胃氣而見也脈無胃氣曰死故真肝脈至中外急如循刀刃責責然如按琴瑟弦色青白不澤毛折乃死真心脈至堅如摶如循薏苡子纍纍然色赤黑不澤毛折乃死真肺脈至大而浮如以毛羽中人膚色白赤不澤毛折乃死真腎脈至搏而絶如指彈石劈然色黑黃不澤毛折乃死真脾脈至如屋漏雀啄色黃青不澤毛折乃死是不兼胃氣也故人以脈氣為宗以胃氣為本也氣血流轉分晝夜圖司天不應脈圖男子尺脈常弱圖女子尺脈常盛圖經曰天地者萬物之父母也陰陽者血氣之男女也男子負陰而抱陽女子負陽而抱陰南方陽也北方陰也男子面南而生則兩寸在南而得其陽故寸脈洪大而尺脈微弱也女子面北而生則兩寸在北而得其陰故寸脈微弱尺脈洪大也男得女脈為不足女得男脈為太過脈訣云女人反此背看之尺脈第三同斷病正謂此也六部主位圖經曰冬至之後得甲子少陽王其脈乍大乍小乍短乍長蓋冬至之後若得第一甲子乃大寒中氣日也自大寒至春分六十日正初之氣分也其時草木方生風令鼓折萬物未有定象故脈大小長短不一也復得甲子陽明旺其脈浮大而短乃第二甲子正春分至小滿六十日二之氣分也其時草木雖生而未茂盛陽氣清明故脈浮大而卻短也復得甲子太陽旺其脈洪大而長乃第三甲子正小滿至大暑六十日三之氣分也其時萬物茂盛陽氣極熱故脈洪大而又長也復得甲子太陰旺其脈緩大而長乃第四甲子正大暑至秋分六十日四之氣分也其時濕熱變作林木津潤故脈緩大而長也復得甲子少陰旺其脈緊細而微乃第五甲子正秋分至小雪六十日五之氣分也其時草木凋零天地肅殺故脈紫細而微也復得甲子厥陰旺其脈沉短以敦乃第六甲子正小雪至大寒六十日終之氣分也其時萬物閉密陽氣伏藏故脈沉而短反敦厚也六氣客脈圖六步主位之脈一定而不移合乎四時之氣候也六分客氣之脈一換而即遷加乎四時之氣候也然主勝則逆客勝則從且今歲丁酉太陰濕土居初之氣分若主氣風木旺則人脈當弦若客氣濕土旺則人脈當緩推此可知餘歲矣又如己亥年陽明燥金居初之氣分若主氣風木旺則天氣溫和人脈當弦若客氣燥金旺則天氣清涼人脈當澀粗工不識氣運之加臨不察主客之勝負便以為春得秋脈金剋木而當死可謂謬矣籲刻舟而求劍膠柱而調瑟豈可與言醫哉婦人陰搏陽別有子脈圖小兒食指辨三關色圖小兒乳抱之時未能飲食不可診脈但以食指三節為三關辨驗之黃赤為熱青黑為痛白為寒見於氣關者主在內之疾見於風關者主在外之疾見於命關者不治脈位輕重初持脈如三菽之重與皮毛相得浮短而澀者肺脈也如六菽之重與血脈相得浮大而散者心脈也如九菽之重與肌肉相得中而和緩者脾脈也如十二菽之重與筋相平沉弦而長者肝脈也按之至骨沉濡而滑者腎脈也脈息遲數人一呼脈二動一吸脈二動呼吸定息脈又一動蓋呼出心與脈吸入腎與肝呼吸之間脾受穀味也故一息脈五動曰平五臟俱有氣也一息脈六動曰數數則為熱一息脈三動曰遲遲則為寒脈來數而時一止後來曰促主積聚氣痞憂思所成脈來緩而時一止後來曰結主傷寒熱痢下之則平也脈動而中止不能自還因而後動曰代代者死脈也脈經曰脈一動一止者兩日死脈兩動一止者四日死脈三動一止者六日死脈四動一止者八日死脈五動一止者十日死脈十動一止者一年後春草生而死二十動一止者二年後清明節而死三十動一止者三年後立秋節而死四十動一止者四年後小麥熟而死五十動一止者五年後草枯水寒時而死聖人斷生死之訣有此徵驗乃不傳之祕也七表屬陽浮脈者輕手乃得重手不見動在肌肉以上曰浮浮以候表脈見諸陽為表熱諸陰為表寒又為風為氣盛為血虛芤脈者浮大而軟按之中空兩邊實曰芤芤主熱盛失血寸芤則吐血微則衄關芤則腸癰下血尺芤則大便血微則小便血甚則俱下滑脈者往來前卻流利如珠浮中如有力與數相似曰滑滑為熱為伏痰為宿食為吐逆為經閉實脈者大而長沉沉浮皆得其數曰實實為甚熱為嘔為痛為喘弦脈者如張弓弦按之不移曰弦為風為勞為拘急為脅痛緊脈者按之如轉索之無常曰緊緊脈主痛與實數相兼則為熱痛與微細相兼則為寒痛洪脈者極大而數舉按滿指狀如群波之湧曰洪洪主陽盛熱極八里屬陰微脈者若有若無極細而軟曰微多兼於遲主於陰寒或傷寒蓄熱在裡脈道不利亦見微細濡弱之脈不可以為寒當以標本別之沉脈者重手乃得輕手不見動在肌肉以下曰沉沉為里為水為寒緩脈者比浮而大縱緩不緊似遲而小疾曰緩緩為傷風自汗為眩暈不仁澀脈者細而遲往來難且散如刀刮竹皮曰澀澀主液血衰亦主心痛遲脈者脈來三至日遲遲則為寒或傷寒亡液過極脈亦遲也伏脈者極重指按之著骨乃得曰伏伏三伏痰為留飲為畜水為溏泄濡脈者極軟而浮細曰濡為自汗為氣弱弱脈者極軟而細沉曰弱弱為氣血俱虛形氣不足斷生死訣汗出發潤喘不休者肺先絶也陽反獨留形體如煙燻直視搖頭者心先絶也唇吻反青四肢漐習者肝先絶也環口黧黑柔汗發黃者脾先絶也溲便遺失狂言目反直視者腎先絶也汗出如油喘不休水漿不下形體不仁乍靜乍亂者命門絶也陽氣前絶陰氣後竭其人死身色必青陰氣前絶陽氣後竭其人死身色必赤腋下溫心下熱也
