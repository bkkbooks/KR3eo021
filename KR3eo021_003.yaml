body:
  text: 卷下察病機第五五運主病諸風掉眩皆屬肝木掉搖也眩昏亂旋運也風主動故也所以風氣甚而頭目眩運者由風木旺必是金衰不能制木而木復生火風火皆屬陽多為兼化陽主乎動兩動相搏則為之旋轉故火本動也焰得風自然旋轉如春分至小滿而為二之氣分風火相搏則多起飄風俗謂之旋風是也四時皆有之由五運六氣千變萬化沖蕩擊搏推之無窮安得失時而便謂之無也但有微甚而已人或乘車躍馬登舟環舞其動不止而左右紆曲經曰曲直動搖風之用也眩運而嘔吐者風熱甚故也諸痛癢瘡瘍皆屬心火人近火氣者微熱則癢熱甚則痛附近則灼而為瘡皆火之用也或癢痛如針輕刺者猶飛迸火星灼之然也癢者美疾也故火旺於夏而萬物蕃鮮榮美也炙之以火漬之以湯而癢轉甚者微熱之所使也因而癢去者熱令皮膚寬緩腠理開通陽氣得泄熱散而去故也或夏熱皮膚癢而以冷水沃之不去者寒能收斂腠理閉密陽氣鬱結不能散越怫熱內作故也癢得爬而解者爬為火化微則亦能令癢爬令皮膚辛辣而屬金化辛能散故金化見而火力分解矣或云痛為實癢為虛非謂虛為寒也正謂熱之微甚也或疑瘡瘍皆屬火熱而反腐出膿水者何也猶穀肉果菜熱極則腐爛而潰為汗水也潰而腐爛者水之化也所謂五行之理過極則勝己者反來制之故火熱過極則反兼於水化又如鹽能固物令不腐爛者鹹寒水化制其火熱使不過極故得久固也萬物皆然諸濕腫滿皆屬脾土地之體也土濕過極則痞塞腫滿物濕亦然故長夏濕土則庶物隆盛也諸氣膹郁病痿皆屬肺金膹膹滿也郁謂奔迫也痿謂手足痿弱無力以運動也大抵肺主氣氣為陽陽主輕清而升故肺居上部病則其氣膹滿奔迫不能上升至於手足痿弱不能運動由肺金本燥燥之為病血液衰少不能榮養百骸故也經曰目得血而能視掌得血而能握指得血而能攝足得血而能步故秋金旺則霧氣蒙郁而草木萎落病之象也萎猶痿也諸寒收引皆屬腎水收斂引急寒之用也故冬寒則拘縮矣六氣為病諸暴強直支痛緛戾裡急筋縮皆屬於風厥陰風木乃肝膽之氣也暴卒也強直堅徑也支痛支持也謂堅固支持筋攣不柔而痛也緛縮也戾乖戾也謂筋縮裡急乖戾失常而病也然燥金主於緊斂短縮徑切風木為病反見燥金之化者由亢則害承乃制也況風能勝濕而為燥也風病勢甚而成筋緩者燥之甚也故甚者皆兼於燥也熱類諸病喘嘔吐酸暴注下迫轉筋小便渾濁腹脹大鼓之如鼓癰疽瘍疹瘤氣結核吐下霍亂瞀郁腫脹鼻窒鼽衄血溢血泄淋閉身熱惡寒戰栗驚惑悲笑譫妄衄衊血汗皆屬於熱少陰君火之熱乃真心小腸之氣也喘火氣甚為夏熱衰為冬寒故病寒則氣衰而息微病熱則氣盛而息粗而為喘也嘔胃膈熱甚則為嘔火氣炎上之象也吐酸者肝木之味也由火盛制金不能平木而肝木自甚故為酸也如飲食熱則易於酸矣或言吐酸為寒者誤也且如酒之味苦而性熱能養心火故飲之則令人色赤氣粗脈洪大而數語澀語妄歌唱悲笑喜怒如狂冒昧健忘煩渴嘔吐皆熱證也其吐必酸為熱明矣況熱則五味皆厚經曰在地為化化生五味故五味熱食則味皆厚也是以肝熱則口酸心熱則口苦脾熱則口甘肺熱則口辛腎熱則口咸或口淡者胃熱也胃屬土土為萬物之母胃為五臟之本故傷生冷堅硬之物則令人噫醋吞酸猶寒傷皮毛能令陽氣壅滯而為病熱也俗醫妄以為冷主溫和脾胃而獲愈者猶傷寒用桂枝麻黃藥發表令汗出而愈也若久吐酸不已則不宜溫之當以寒藥下之後以涼藥調之所以中酸而不宜食油膩之物者蓋因能令氣之壅塞也暴注卒瀉也腸胃熱甚而傳化失常火性疾速故也下迫裡急後重也火能燥物能令下焦急迫也轉筋熱燥於筋而筋轉也或言轉筋為寒者誤也所謂轉者動也陽動陰靜熱證明矣霍亂吐瀉之人必有轉筋之證大法吐瀉煩渴為熱不渴為寒霍亂轉筋而不渴者未之有也或曰以溫湯漬之則愈以冷水沃之則劇何也蓋溫湯能令腠理開發熱氣消散轉筋即止冷水能令腠理閉密熱氣鬱塞轉筋不止世俗見溫湯漬之而愈妄疑為寒也小便渾濁天氣寒則水清潔天氣熱則水渾濁如清水為湯則自白濁也腹脹大鼓之如鼓氣為陽熱盛則氣盛故腹脹滿也癰淺而大也經曰熱勝血則為癰膿也疽深而惡也瘍有頭小瘡也疹浮小癮疹也瘤氣赤瘤丹熛熱勝氣也結核熱氣鬱結堅硬如果中核也不必潰發但令熱氣散自然消也吐下霍亂三焦為水穀傳化之道路熱氣甚則傳化失常而吐瀉霍亂也或言吐瀉為寒者誤矣大法吐瀉煩渴為熱不渴為寒或熱吐瀉始得之亦有不渴者若不止則亡液而後必渴或寒本不渴若亡津液過多則亦燥而渴也大抵完穀不化而色白吐利腥穢澄徹清冷小便清白不澀身涼不渴脈沉細而遲者寒證也如小兒病熱吐利乳未消而色尚白不可便言為寒當以飲食藥物之色別之若穀雖不化而色變非白小便赤黃吐利煩渴脈洪大而數者熱證也蓋瀉白為寒余皆為熱瀉白者肺金之色也由寒水甚而制火不能平金肺金自甚故色白也瀉青者肝木之色也由火盛制金不能平木肝木自甚故色青也如傷寒少陰下利青水色純青仲景以大承氣湯下之為熱明矣瀉黃者脾土之色也由火盛水衰脾土自旺故色黃也瀉紅者心火之色也瀉黑者腎水之色也由亢則害承乃制火熱過極反兼水化制之故色黑也下利色黑者即死又如瘡癤皆屬火熱其本一也其標則有五焉以其在皮膚之分屬肺金故出白膿以其在血脈之分屬心火故為血癤以其在肌肉之分屬脾土故出黃膿以其在筋之分屬肝木故其膿色帶蒼深至骨屬腎水故紫黑血也若以下痢黑者為寒然則瘡癤之出紫黑血者亦為冷歟又如痢本濕熱之相兼也舉世皆言赤痢為熱白為寒者誤之久矣殊不知陰陽之道猶權衡也一高則必一下一盛則必一衰故陽盛者陰必衰陰盛者陽必衰自然之理也豈有陰陽二氣俱盛於腸胃而同為赤白之痢乎夫痢何也蓋因六七月間世之穀肉果菜濕熱太盛人食之感其毒氣於腸胃而化為汗水腐爛為膿血而下赤白也治痢之法當以苦寒之藥治之如晉朝錢仲陽處香連丸以治小兒之痢深得玄理木香苦溫黃連苦寒苦能燥濕寒能勝熱溫能開發腸胃之鬱結愈痢多矣今世俗醫但以辛熱薑桂之藥以治諸痢病之微者能令腸胃開通鬱結消散苟獲一愈病之甚者怫熱不開痢疾轉盛輕則為小溲不通水腫之疾重則為瞀亂之病而死矣深可嘆哉又如婦人赤白帶下之病同乎痢也蓋人有十二正經脈有奇經八脈帶脈者奇經之一也起於季脅回身一周如束帶然婦人下焦濕熱太甚津液湧溢從帶脈淋瀝而下也舉世皆言白帶為寒者亦誤矣凡病此者必頭目昏眩口苦舌乾咽嗌不利小便赤澀大便祕滯脈實而數皆熱證也治帶下之法亦以辛苦寒藥為主不可驟用燥熱之藥以損人生命也又如酒蠱而大便濡瀉者亦由濕熱也或水腫或發黃皆濕熱也嗚呼人既有形不能無病有生不能無死然醫者但當按法治之若標本不明陰陽不審誤投湯藥實實虛虛而死者是誰之過歟故曰世無良醫枉死者半詎不誣矣瞀神昏而氣濁也郁熱極則腠理鬱結而氣道不通也腫脹陽熱太甚則腫滿䐜脹也如六月庶物隆盛腫脹之象明可見矣鼻窒謂鼻塞也傷風寒於腠理而為鼻塞者塞能收斂陽氣不通暢也人側臥則下竅通利上竅反塞者謂陽明之經左右相交於鼻也鼽鼻出清涕也衄鼻出血也血溢血出於上竅也血泄血出於下竅也淋熱客膀胱小便澀痛也或曰小便澀而不通為熱遺溲不禁為冷豈知熱甚客於腎部干於足厥陰之經廷孔鬱結極甚氣液不能宣通故痿痹而神無所用津液滲入膀胱而為溲也如傷寒少陰熱極則遺溲其理明矣世傳衆方又有冷淋之說可笑也已及觀其所治之方還用榆皮瞿麥苦寒之藥其說雖妄其方乃是由不知造化變通之理宜半認是而作非也學不明而欲為醫難矣哉悶大便澀滯也由火盛制金不能平木肝木生風風能勝濕熱能耗液故也身熱惡寒邪熱在表而反惡寒也故仲景治傷寒之法以麻黃湯汗之或曰寒在皮膚則熱在骨髓熱在皮膚則寒在骨髓此說非也戰栗謂火熱過極反兼水化制之故戰栗而動搖也傷寒日深大汗將出必先戰粟熱極故也人恐懼而戰栗者恐則傷腎水衰故也驚心卒動而不寧也惑疑惑而志不一也悲謂心火熱盛則凌肺金金不受制故發悲哭也悲哭而涕淚俱出者如火熱鍊金反化為水也是以肝熱甚則出泣心熱甚則出汗脾熱甚則出涎肺熱甚則出涕腎熱甚則出唾猶夏熱太盛則林木流津也笑心火熱盛喜志發也或以輕手擾人脅肋膕腋令癢而笑者擾亂動撓火之化也譫多言也心熱神亂則語言妄出也妄狂妄也心熱神昏則目有所見也衄衊血汗謂鼻出紫黑血也濕類諸痙強直積飲痞隔中滿吐下霍亂體重胕腫肉如泥按之不起皆屬於濕太陰濕土乃脾胃之氣也痙痓也強直謂強項也太陽經中濕則令人項強有汗者曰陰痓仲景所謂柔痙是也無汗者曰陽痓仲景所謂剛痙是也積飲謂留飲也痞否也謂氣不升降也如否卦陽在上陰在下則天地閉塞矣隔阻滯也腸胃濕甚則傳化失常也中滿土位中央濕則令人中焦滿也吐下霍亂謂腸胃濕飲相兼故也體重清陽為天濁陰為地濕土為病體重宜也胕腫濕勝於下也肉如泥按之不起濕勝於身也火類諸熱瞀瘛暴瘖冒昧躁擾狂越罵詈驚駭胕腫疼酸氣逆衝上禁栗如喪神守嚏嘔瘡瘍喉痹耳鳴及聾嘔湧溢食不下目昧不明暴注瞤瘛暴病暴死皆屬於火絡三焦之氣也少陽相火乃心也瞀昏也君火化同瘛熱令肌肉跳動也暴瘖卒啞也心火熱盛上克肺金不能發聾也冒昧昏憒也躁擾謂熱盛於外手足不寧也狂越謂乖越禮法而失常也經曰登高而歌棄衣而走罵詈不避親疏熱極故也罵詈言之惡也水數一道近而善火數二道遠而惡心火熱極則發惡言也驚駭君火化同胕腫熱勝於內也疼酸痠疼者由火盛制金不能平木故也氣逆衝上火氣炎上也禁栗如喪神守栗戰栗也禁冷也如喪神守火極而似水化也嚏鼻中因癢而氣噴作其聲也嘔瘡瘍君火化同喉痹熱客上焦而咽嗌腫也耳鳴熱沖聽戶耳中作聲也聾水衰火盛氣道閉塞耳不聞聲也微則可治久則難通嘔湧溢食不下胃膈熱盛火氣炎上之象也目昧不明五臟熱極則目昏不能視物也瞤瘛惕跳而肉動也暴病暴死火性疾速故也由其平日飲食衣服性情好惡不循其宜而失其常久則氣變興衰而為病也蓋因腎水衰虛心火暴盛本不能制之熱氣怫鬱心神昏冒則筋骨不用卒倒而無所知也若熱甚至極則死微則發過如故俗云暗風若氣血鬱結不得宣通鬱極乃發若一側得通利否者痹而癱瘓也燥類諸澀枯涸幹徑皴揭皆屬於燥陽明燥金乃肺與大腸之氣也澀遍身澀滯不滑澤也枯不榮生也涸不通流也干不滋潤也徑不柔和也皴揭皮膚開裂也皆血液病爾寒類諸病上下所出水液澄徹清冷癥瘕頽疝堅痞腹滿急痛下痢清白食已不飢吐利腥穢屈伸不便厥逆禁固皆屬於寒足太陽寒水乃腎與膀胱之氣也上下所出水液澄徹清冷如天氣寒則水自然澄清也癥氣聚之積或聚或散無有常處也瘕血結之塊蓋由女子月水沉滯久而成瘕也經曰小腸移熱於大腸為虙瘕為沉然則血瘕亦有熱者也當以標本明之頽疝足厥陰經受寒則陰腫也堅痞腹滿急痛如水寒則冰堅硬如地也下利清曰水寒則清淨明白也食已不飢胃熱能消穀寒則不能消穀食雖已而亦不飢也吐利腥穢寒水甚而制火不能平金肺金自盛故水腥也屈伸不便厥逆禁固謂手足蜷攣而冷也理傷寒第六夫寒者天地殺厲之氣也秋之霧露冬之霜雪皆寒邪也是以辛苦之徒起居不由乎節飲食不順乎時感其霧露之氣則其邪淺感其霜雪之氣則其邪深感而即病名曰傷寒不即病者寒邪藏於肌肉之間伏於榮衛之內至春因溫暖之氣而發者名曰溫病至夏因暑熱之氣而作者名曰熱病傷寒也溫病也熱病也一理而已若乃疫癘之疾稍有不同者蓋因春應溫而反涼夏應熱而反冷秋應涼而反熱冬應寒而反溫四時不正之氣也感其春夏不正之邪則為溫疫感其秋冬不正之邪則為寒疫然其經絡傳受表裡受證與傷寒同也俗云時氣病爾經總之曰傷寒所以謂之大病者害人最速也軒岐以下得其治法之祕者惟仲景一人而已厥後守真先生不遵其桂枝麻黃髮表之藥自制雙解通聖奇涼之劑非不同也時有異也彼一時也奈五運六氣有所更世熊居民有所變天以常靜人以常動動則屬陽靜則屬陰清平之世同木化也雖有辛熱之藥不生他證擾鑲之世同火化也若用辛熱之藥則發黃出斑變壞之病作矣蓋人內火既動外火又侵所以辛熱發汗不如辛溫辛溫發汗不如辛涼之藥發汗一劑而立愈以辛熱之藥發汗輕者必危重者必死可不謹哉六經傳受傷寒一日足太陽膀胱經受證故頭項痛腰脊強二日足陽明胃之經受證故身熱目疼鼻乾不得臥三日足少陽膽之經受證故胸脅痛而耳聾四日足太陰脾之經受證故腹滿而嗌乾五日足少陰腎之經受證故口燥舌乾而渴六日足厥陰肝之經受證故舌卷而耳聾囊縮至七日足太陽病衰頭痛少愈八日陽明病衰身熱少愈九日少陽病衰耳聾微聞十日太陰病衰腹減如故則思飲食十一日少陰病衰渴止腹不滿舌乾已而嚏十二日厥陰病衰囊縱少腹微下大邪皆去病漸愈矣此傳經之定序也亦有太陽經至了不傳者當以脈證別之或曰傷寒只傳足經不傳手經何也曰傷寒之邪多於足經而其病甚少於手經而其病微故不特言手經但寄於足經而已三日以前在表法當汗之三日以後在裡法當下之亦有二三日便有里證而當下之者亦有七八日尚有表證而當汗之者豈可拘以日數哉是以聖人書不盡言言不盡意說其大概此之謂也其有兩感於寒者必不免於死謂表裡相傳也一日太陽與少陰俱病頭痛口乾煩滿而渴二日陽明與太陰俱病身熱腹滿不欲食譫語三日少陰與厥陰俱病耳聾囊縮而厥水漿不入不知人而死矣調理之法當分表裡治之汗氣傳染養生至寶書云近穢氣觸真氣近死氣亂生氣深有旨哉孫真人云乘馬遠行至暮當以沐浴更衣方可近於嬰兒處所若感其氣則為急驚風搐又曰步踐糞穢之履勿使近於嬰兒若感其氣則為天吊傷寒大汗將出當以艾灸席隅以闢其氣不然感其汗氣則傳染矣所以多染侍奉勞役之人者由其神虛氣怯易為撓亂故也如剝死馬者感其毒氣而為馬氣之疾其理同焉內外傷辨外有風寒暑濕內有飢飽勞逸或曰勞役非也勞倦也逸者閒逸也西山記曰久勞則安閒以保極力之處久逸則導引以行積滯之氣表裡證病在身體四肢為表證發熱惡寒頭痛是也病在胸腹之內為里證譫語煩渴腹滿是也病在脅肋間為半表半裡證胸脅痛而耳聾是也主療心法傷寒表證當汗而不可下里證當下而不可汗半在表半在裡則當和解不可發汗吐下在上則湧之在下則泄之傷寒表實無汗頭項痛腰脊強身熱惡寒肩背拘急手足指末微厥脈浮緊而澀當以清解散加天水散汗之傷風表虛自汗頭項強痛肢節煩疼鼻鳴乾嘔惡風手足溫脈浮緩當以通解散或天水散解之或表虛或表實但口乾煩渴者悉宜雙解散汗之汗後餘熱不解以涼膈散退之或日深或日淺但有表證而脈沉數者先以天水連翹飲子清之待脈浮而裡熱減然後以雙解散汗之傷寒表不解脈浮小便不利微熱口乾以五苓散分之表熱多裡熱少益元一涼膈半和解之裡熱多表熱少涼膈一益元半調之若表裡俱熱頭痛口乾自汗不止者白虎湯治之或半在表半在裡往來寒熱口苦舌乾耳聾乾嘔胸脅痞痛小柴胡湯和解之或膈熱嘔吐不止者半夏橘皮湯治之或飲水不止以成濕熱大便泄瀉小便赤澀腹滿急痛頭痛口乾者桂苓甘露飲主之或濕熱內余而成下痢頻並少腹而痛者黃連解毒湯治之傷寒日深表裡熱勢極甚心下急郁微煩或發熱汗出不解心下痞硬嘔吐下痢或陽明病多汗或太陰腹滿實痛或少陰下痢清水心下痛而口乾或無表裡證但發熱七八日脈須浮數宜雙除表裡之熱大柴胡湯微下之或加小承氣湯尤妙傷寒日深裡熱極甚日晡潮熱譫言妄語發狂腹滿實痛法當大承氣湯下之或用三一承氣湯尤良舌黑者十死一生此調理傷寒之正法也世之庸醫不知標本不明經絡當汗而反下之當下而反汗之所以損人生命不為少矣籲人之死者豈皆命也亦由庸醫誤殺之也若傷寒表證實具誤以大承氣下之太早使表熱裡寒下利清穀不化者當急救里白朮調中湯止之待利止里和隨其表證之虛實而治之也誤以巴豆丸藥下之使表熱裡虛脅熱下利者當以五苓散治之若不下利表熱乘虛入里結於心下脈浮滿而痛者名曰小結胸當以小陷胸湯治之從心下至小腹堅滿硬痛脈沉緊數日晡潮熱不可按者名曰大結胸當以大陷胸湯下之脈浮者不可下下之則死當以小柴胡湯加小陷胸湯解之傷寒半表裡之證誤以大承氣湯下之太早表熱乘虛入里結於心下滿而不痛者名曰痞氣或下利而小便不通或嘔噦而心煩不止當以生薑湯調五苓散連進四五服即愈或不愈者必作實熱關脈沉數譫妄者當以大黃黃連瀉心湯治之或飲水過多水停心下小便不利濕熱內作其人頭汗出身無汗際頸而還小便不利渴飲水漿者身目發黃也未黃者茵陳湯調五苓散以分其小便已黃者當以茵陳蒿湯下之當下如爛魚腸肚及膠膘等物小便多出金汁即愈也或發黃而兼發斑者茵陳蒿湯加大承氣湯下之或發黃而兼結胸者茵陳蒿湯加大陷胸湯下之或不腹脹滿而痛小便自利大便黑色者有瘀血而發黃也當以茵陳蒿湯加桃仁承氣湯下之或傷寒日深失下以致蓄熱在裡陽厥極深表有斑疹身痛不可忍手足清冷目赤口乾譫語呻吟脈微不見此乃陰耗陽竭之證也下之即死不下亦死醫者到此殺人活人一彈指間按法當以涼膈散加黃連解毒大作劑料養陰退陽待心胸復暖脈氣漸生然後以三一承氣湯下之下後熱未愈涼膈散調之朱奉議編南陽活人書不識此證乃曰火極似水陽極似陰而妄以為陰毒冷病誤用真武湯附子之藥死人不為少矣傷寒日深大汗將出先發戰者由水升火降氣和而愈矣戰而有汗者津液不衰也戰而無汗者津液已衰也傷寒瘥後當節飲食慎起居若梳頭洗面憂思恚怒其熱復來謂之勞復當以雙解散清之若飲食太多其熱復作謂之食復當以小承氣湯下之若食羊肉者難治演治法第七論標本夫標本之道要而博小而大可以言一而知百病之害言標與本易而勿損察本與標氣可令調又曰知本知標萬舉萬當不知標本是謂妄行蓋六氣為本三陰三陽為標又曰為病之氣為本受病之經絡臟腑為標又曰先病為本後病為標急則治其標緩則治其本或本而標之或標而本之故曰知其要者一言而終不知其要流散無窮七方大小緩急奇偶復大方之說有二病有兼證而邪不專宜君一臣三佐九之大方病在腎肝之下而遠者宜分兩多而頓服之小方之說有二病無兼證而邪氣專宜君一臣二之小方病在肺之上而近者宜分兩少而頻服之緩方之說有五有甘以緩之之緩方知糖密棗葵甘草之屬取其甜能戀膈也有丸以緩之之緩方蓋丸之比湯散氣力宣行遲故也有無毒治病之緩方蓋性無毒則功自緩矣有品件群衆之緩方如萬病丸七八十味更相拘制各不得騁其性也有補上治上之緩方補上治上制之以緩故曰治心肺之病不厭頻而少急方之說有五有急病急攻之急方如中風牙關緊急漿粥不入用急風散之屬是也有藥性急烈之急方如溲便閉塞借備急丹以攻之是也有湯散蕩滌之急方湯散之比丸下咽易散故也有藥性有毒之急方蓋有毒之藥能上湧下泄可以奪病之大勢也有補下治下之急方蓋補下治下制之以急故曰治腎肝之病不厭頻而多奇方之說有二有古之單方之奇方獨用一物是也有數合陽數之奇方一三五七九皆陽數也故奇方宜下不宜汗偶方之說有二有古之復方之偶方兩物相配是也有數合陰陽之偶方二四六八十皆陰數也故偶方宜汗不宜下復方之說有一方二方三方之復方如調胃承氣湯加連翹黃芩梔子薄荷為涼膈散再加防風荊芥石膏滑石桔梗川芎麻黃當歸芍藥白朮為通聖散有分兩均齊病復方如胃風湯各等分是也十劑宣通補瀉輕重滑澀燥濕宣鬱而不散為壅必宣劑以散之生薑橘皮之屬是也又曰以君召臣曰宣宣則湧劑如瓜蒂散亦宣劑也通留而不行為滯必通劑以行之防己朮通之屬是也又曰溲便淋悶宜用八正散以通之亦通劑也通為輕而瀉為重也補不足為弱必補劑以扶之黃耆羊肉之屬是也又曰陽虛則補以乾薑附子陰虛則補以大黃硝石亦補劑也瀉有餘為塞必瀉劑以逐之如大黃巴豆之屬是也又曰甘遂牽牛亦瀉劑也輕實則為壅必輕劑以揚之麻黃葛根之屬是也又曰如嚏藥解表亦輕劑也重快則氣浮必重劑以鎮之如磁石鐵粉之屬是也又曰如癇涎疾宜代赭石以縋之亦重劑也滑澀則氣著必滑劑以利之如冬葵榆皮之屬是也又曰大便結燥治以桃仁郁李小便淋澀治以車前滑石亦滑劑也澀滑則氣脫必澀劑以救之如龍骨牡蠣之屬是也又曰如寢汗不止澀以麻黃根防己滑瀉不止澀以枯白礬罌粟殼如喘嗽上奔以韭汁烏梅煎寧肺散亦澀劑也燥濕氣淫勝必燥劑以除之如桑白皮赤小豆之屬是也又曰如乾薑官桂能治積寒久冷如蒼朮白朮陳皮木香皆能除濕如黃連黃柏黃芩山梔子味苦屬火苦能燥濕亦燥劑也濕津耗為枯必濕劑以潤之如紫石英之屬是也又曰硝味鹹寒木屬真陰之水誠濡枯之上藥亦濕劑也中風大中風者百病之長也善行而數變脈訣云熱極生風深有理焉蓋因以火為本以風為標心火暴甚腎水必衰肺金既摧肝木自旺所中風者非由外傷於風耳由平日飲食起居性情好惡不修其宜而失常久則氣變興衰以便陽盛陰虛而為病也中腑者多著四肢使人手足癱瘓不能運動也中藏者多滯九竅使人口眼喎斜舌謇不語大小便不通也治法先以降心火為主或清心湯或瀉心湯大作劑料服之心火降則肝木自平矣次以防風通聖散汗之或大便閉塞者三化湯下之內邪已除外邪已盡當以羌活愈風湯常服之宣其氣血導其經絡病自己矣或舌謇不語者轉舌膏或活命金丹以治之此聖人心法也或有中風便牙關緊急漿粥不入急以三一承氣湯灌於鼻中待藥下則口自開矣然後按法治之世之庸醫不明素問之理皆作氣不順之病但服八味順氣散百萬人中曾有一二人愈者也可不謹哉風癇夫癇之為病角弓反張手足搐搦口吐涎沫俗云豬圈風也亦因火盛金衰木旺生風外由驚邪入內以致之經曰風盛則動正謂此也治法當先以瓜蒂散吐之頑涎既盡次以三一承氣湯下之清心湯利之通聖散服之後以如神丸鎮之病自愈矣風寒濕痹夫痹之為狀膝麻不能屈伸或腫或痛皆由當風取涼寢處卑濕感其風寒濕三氣之邪和於肌肉麻者風也痛者寒也腫者濕也治法先以禹散或三花神祐丸下之次以如意通聖散汗之後以獨活寄生湯服之及延壽丹蠲之此萬舉萬全之法也俗醫呼為寒濕風氣驟用烏頭附子等藥差之遠矣霍亂吐瀉夫吐瀉既作揮霍之必撩亂矣為病之源有三猶書生鼎足題也吐者竭也心火炎上之疾也瀉者濕也濕土注下之疾也轉筋者風也木火撓亂之疾也斯由七月之間濕熱大作風涼乘之入於脾胃三氣俱作所以上吐下瀉而轉筋也偉哉王冰之言曰霍亂吐瀉脾熱所生可以為古式也俗醫不明素問妄以為傷冷之疾而用乾薑官桂燥熱之藥可謂投賊以刃矣治法當用生薑細切漬以新汲井水調益元散頓服之吐瀉即止矣大渴者桂芩甘露飲治之如過無藥之處可掘一坎深半尺貯以井水以手攪之使泥水混濁良久泥下水清取以飲之亦能愈矣外傷夫邪從外至傷於皮膚榮衛之間名曰外傷風感冒風寒是也外傷之候有二傷於寒者榮血受之使頭項痛肢節煩疼鼻鳴乾嘔也治法當以通聖散煎二度各一碗先以第二煎者頓服之以雞翎探於喉中盡吐前藥腠理開發再以第一煎者服之汗隨而出風寒解也內傷夫內傷之候皆由飲食失節起居不時飢飽勞逸內傷元氣其人四肢不舉百骨痠疼口淡無味體困無力頭眩有時作有時止手心熱手背不熱與感冒風寒之病大同而小異治法當以補中益氣湯連進一二服即愈矣此濟生拔粹之祕法也瘧夫瘧酷之瘧害人非輕經曰夏傷於暑秋必病瘧蓋因暑毒伏於榮衛之間而不發因遇秋氣淒滄之水寒瘧疾因而成矣或傷於暑而後傷於風則先熱而後寒或先傷於風而後傷於暑則先寒而後熱邪氣淺者連日作邪氣深者間日作治法輕者先以大柴胡湯三一承氣湯下之後以柴胡飲子白虎湯頓服之立解重者先以三花神祐丸或大承氣湯下後以天水五苓散分之如不愈者當以常山散吐之但禁魚犬豬羊半月則愈矣痢夫痢濕熱疾也世俗以赤為熱以白為寒已明辨矣治法如腹痛不已裡急後重數至圊而不能便腸垢積滯當以三一承氣湯或玄清丸下之次以黃連解毒湯加當歸白芍藥服之後多服芍藥柏皮丸如小便赤澀者黃連解毒湯加五苓散以滲泄之間服玄清丸此活人良法也三消夫三消之病消渴消中消腎皆火也入水之物無物不潤入火之物無物不消蓋消渴之疾將飲水至鬥亦不能止其渴相火燥其膈膜此膈消也治法調之而不下固無以殺炎上之勢下之而不調亦無以沃膈膜之干下之當以三一承氣湯調之當以涼膈散加桂苓甘露飲大作劑料服之間用生地黃生藕擂汁服之又當慎起居戒淫欲消渴之疾不足憂矣相火燥其肺臟者此肺消也飲一泄二者必死消中之疾多食而反瘦亦多渴而飲水相火燥其胃土也治法當以三一承氣湯節次下之五七次後用涼膈散白虎湯桂苓甘露飲三藥合為一服服之必愈矣腎消者相火燥其腎臟者也經曰思想無窮所願不得意淫於外縱欲太甚白淫因溲而下或夢寐遺脫治法宜珍珠粉丸或封髓還元丹服之必愈矣此不傳之祕妙也五泄夫泄瀉之疾其源有五以一氣為主諸氣乘之而成也胃泄者飲食不化色共同風乘濕之泄也治法當用胃風湯即止脾泄者腹脹滿泄注食即嘔吐逆此暑乘濕之泄也治法當用香薷湯對桂苓甘露飲大加生薑治之大腸泄者食已窘迫大便色白腸鳴切痛此燥乘濕之泄也治法當用天水五苓散分之小腸泄者溲而便膿血小腹痛此火乘濕之泄也治法當以玄青丸下之次以黃連解毒湯加當歸白芍藥治之後以芍藥柏皮丸止之大瘕泄者裡急後重頻至圊而不能便莖中痛此寒乘濕而變為熱泄也治法當以八正散加木香檳榔通之次以天水散頓服之此治五泄之法也二陽經曰二陽之病發於心脾有不得隱曲女子不月蓋二陽者謂足陽明胃之經手陽明大腸經腸胃積熱久而不散心受之則血不流故女子不月脾受之則味不化故男子少精其病面色痿黃肌膚瘦削骨蒸潮熱或往來寒熱咳嗽喘滿痰盛有血飲食乍進而乍退精神或增而或減此火多水少陽盛陰虛之病也治法降心火益腎水先以涼膈散加當歸桔梗徐徐呷之次以柴胡飲子或防風當歸飲子服之血不流者宜琥珀散以通之精不足者宜粱肉以補之後世俗醫見此為勞證名既謬而法亦乖矣咳嗽夫咳嗽之疾一也或曰咳者有聲而無痰嗽者有痰而無聲又曰咳為陽嗽為陰皆無考據咳嗽非獨寒也六氣皆能為嗽焉風嗽者頭目眩暈痰涎不利宜通聖散汗之搜風丸以清之火嗽者口燥舌乾喘逆唾血宜涼膈散加當歸桔梗以治之大金花丸以解之暑嗽者面赤手冷頭有自汗宜白虎湯以除之濕嗽者面腫上喘宜大橘皮湯以止之甚者三花神祐丸下之燥嗽者往來寒熱涕唾稠黏宜柴胡飲子以治之寒嗽者手足厥逆宜寧肺散以收之彼謬醫不分六氣執以為寒驟用枯白礬罌粟殼雖老亦無悟矣膈食經曰三陽結謂之膈蓋足太陽膀胱經水道不行手太陽小腸經津液枯涸足陽明胃之經燥糞結聚所以飲食拒而不入縱入太倉還出喉嚨人之腸胃一日一便乃常度也今膈食之人五七日不便陳物不去新物不納俗醫強分為五膈十噎支派既多並喪其實標本不明是以火里煨薑湯中煮桂胡椒未已蓽菝繼之丁香未已豆蔻繼之雖曰和胃胃本不虛雖曰溫脾脾本不寒此其所以膈食之病曠日彌年而不愈也治法當用三一承氣湯節次微下之後用芝麻飲啜之陳莝去而腸胃潔癥瘕盡而榮衛昌飲食自進矣留飲夫留飲之疾蓄水也或因夏月飲水過多逆而不散或因暴怒未息而飲水或因憂患未決而飲水或因遠來困倦而飲水皆能成留飲之病也使人面腫目浮支脅中滿痰涎不利治法當以三花神祐丸或牽牛與木香減半或為末或為丸下之則愈矣七疝夫疝乃厥陰肝之經腎與膀胱之部分也水疝者因冬月涉水其狀囊腫痛癢搔之則黃水出治法宜禹攻散或三花神祐丸下之寒疝者因觸冒風雪坐臥磚石其囊腫堅硬如石大痛治法宜禹攻散或三花神祐丸下之血疝者因肝腎積熱其狀臍之兩傍腫痛俗云便毒治法當以當歸玉燭散下之筋疝者因淫欲太過其狀陰莖潰痛或血或膿俗云下疳瘡治法先以瀉心湯下之後以黃連輕粉為末傅之惟有狐疝之病俗云奔豚氣癃疝之病俗云下部病氣疝之病俗云偏墜最難治也辨藥性情第八六陳狼毒茱萸枳實麻黃橘皮半夏十八反甘草反大戟芫花甘遂海藻烏頭反半夏瓜蔞貝母白蘞白芨藜蘆反細辛芍藥丹參沙參苦參玄參君臣佐使上品無毒之藥為君中品小毒之藥為臣下品大毒之藥為佐使此本草論藥之性體也主病者為之君攝君者謂之臣應臣者謂之佐使此內經論藥之能用也如治諸熱則以黃連黃芩為君治諸寒則以乾薑附子為君治表實則以麻黃柴胡為君治表虛則以升麻葛根為君治裡實則以大黃芒硝為君治裡虛則以甘草芍藥為君君藥分兩最多臣藥次之佐使藥又次之不可令臣過於君君臣有序相與宜攝可以御邪除病矣東垣諸品藥性羌活味苦甘平氣微溫無毒升也陰中陽也其用有五散肌表八風之邪利周身百節之痛排巨陽肉腐之疽除新舊風濕之證乃手足太陽表裡引經藥也升麻味苦平氣微寒無毒升也陰中之陽也其用有四引蔥白散手陽明之風邪引石膏止足陽明之齒痛引諸藥遊行四經升陽氣於至陰之下因名之曰升麻柴胡味苦平氣微寒無毒升也陰中之陽也其用有四左右兩傍脅下痛日晡潮熱往來生在藏調經內主血在肌主氣上行經手足少陽表裡四經藥也白芷味辛氣溫無毒升也陽也其用有四去頭面皮膚之風除皮膚燥癢之痹止足陽明頭痛之邪為手太陰引經之劑防風味甘辛氣溫無毒升也陽也其用有二以風味能瀉肺金以體用通療諸風當歸味甘辛氣溫無毒可升可降陽也其用有四頭止血而上行身養血而中守稍破血而下流全活血而不走獨活味苦甘平氣微溫無毒升也陰中之陽也其用有三諸風掉眩頸項難伸風寒濕痹兩足不用及為足少陰之引經藥也木香味苦辛氣微溫無毒降也陰也其用有二調諸氣不可無泄肺氣不可缺檳榔味苦辛氣溫無毒降也其用有二墜諸藥性若鐵石治後重驗如奔馬吳茱萸味苦辛性熱有小毒可升可降陽也其用有四咽嗌寒氣噎塞而不通胸中冷氣閉塞而不利脾胃停冷腹痛而不任心氣刺疼成陳而不止藿香葉味甘性溫無毒可升可降陽也其用有二開胃口能進飲食止霍亂仍除嘔逆川芎味辛性溫無毒升也陽也其用有二上行頭角助清陽之氣止痛下行血海養新生之血調經黃連味苦性寒無毒沉也陰也其用有四瀉心火消心下痞滿之狀主腸澼除腸中混雜之紅治目疾暴發宜用療瘡瘍首尾俱同黃芩味苦平性寒無毒可升可降陰也其用有四中枯而飄者瀉肺火消痰利氣細實而堅者瀉大腸火養陰退陽中枯而飄者除風濕留熱於肌表細實而堅者滋化源退熱於膀胱大黃味苦性寒無毒其性沉而不浮其用走而不守奪土鬱而無壅滯定禍亂而致太平名曰將軍黃柏味苦性寒無毒沉也陰也其用有五瀉下焦隱伏之龍火安上出虛噦之蛔蟲臍下痛單制而能除腎不足生用而能補痿厥除濕藥中不可缺玄明粉味辛甘酸性微溫無毒沉也陰也其用有二去胃中之實熱蕩腸中之宿垢其妙不可盡述大抵用此而代盆硝也白朮味甘性溫無毒可升可降陽也其用有四利水道有除濕之功強脾胃有進食之效佐黃芩有安胎之能君枳實有消痞之妙人參味甘性溫無毒升也陽也其用有三止渴生津液和中益元氣肺寒則可服肺熱還傷肺黃耆味甘性溫無毒升也陽也其用有四溫分肉而實腠理益元氣而補三焦內托陰證之瘡瘍外固表虛之盜汗甘草味甘平無毒生之則寒炙之則溫生則分身梢而瀉火炙則健脾胃而和中解百毒而有效協諸藥而無爭以其甘能緩急故有國老之稱半夏味辛平生寒熟溫有毒降也陽也其用有四除濕化痰涎大和脾胃氣痰厥及頭疼非此莫能治陳皮味辛苦性溫無毒可升可降陽中之陰也其用有二留白者補胃和中去白者消痰泄氣青皮味苦性寒無毒沉也陰也其用有四破滯氣愈低而愈效削堅積愈下而愈良引諸藥至厥陰之分下飲食入太陰之倉枳殼味苦酸性微寒無毒沉也陰也其用有四消心下痞寒之痰泄腹中滯塞之氣推胃中隔宿之食削腹內連年之積枳實味苦酸性微寒無毒沉也陰也其用有四消胸中之虛痞逐心下之停水化日久之稠痰削年深之堅積桔梗味苦辛性微溫有小毒升也陰中之陽也其用有四止咽痛兼除鼻塞利膈氣仍治肺癰一為諸藥之舟楫一為肺部之引經知母味苦性寒無毒沉也陰中之陰也其用有四瀉無根之腎火療有汗之骨蒸止虛勞之陽勝滋化源之陰生藁本味苦辛性微溫無毒升也陰中之陽也其用有二大寒氣客於巨陽之經苦頭痛流於巔頂之上非此味不除生地黃味甘苦性寒無毒沉也陰也其用有四涼心火之血熱瀉脾土之濕熱止鼻中之衄熱除五心之煩熱熟地黃味甘苦性溫無毒沉也陰也其用有四活血氣封填骨髓滋腎水補益真陰傷寒後脛股最痛新産後臍腹難禁五味子味酸性溫無毒降也陰也其用有四滋腎經不足之水收肺氣耗散之金除煩熱生津止渴補虛勞益氣強陰川烏味辛性熱有毒浮也陽中之陽也其用有二散諸風之寒邪破諸積之冷痛白芍藥味酸平性寒有小毒可升可降陰也其用有四扶陽氣大除腹痛收陰氣陡健脾經墜其胎能逐其血損其肝能緩其中白茯苓味甘淡性溫無毒降也陽中之陰也其用有六利竅而除濕益氣而和中小便多而能止大便結而能通心驚悸而能保津液少而能生白者入壬癸赤者入丙丁澤瀉味甘鹹性寒無毒降也陽中之陰也其用有四去胞垢而生新水退陰汗而止虛煩主小便淋澀仙藥療水病濕種靈丹薄荷葉味辛性涼無毒升也陽也其用有二清利六陽之會首祛除諸熱之風邪麻黃味苦甘性溫無毒升也陰中之陽也其用有二其形中空散寒邪而發表其節中閉止盜汗而固虛厚朴味苦辛性溫無毒可升可降陰中之陽也其用有二苦能下氣去實滿而消痰泄脹溫能益氣除濕滿而散結調中杏仁味苦甘性溫有毒可升可降陰中之陽也其用有二利胸中氣逆而喘促潤大腸氣祕而難便巴豆味辛性熱有大毒浮也陽中之陽也其用有二削堅積蕩臟腑之沉寒通閉塞利水穀之道路斬關奪門之將不可輕用黑附子味辛性熱有大毒浮也陽中之陽也其性浮而不沉其用走而不息除六腑之沉寒補三陽之厥逆蒼朮氣味主治與白朮同補中除濕力不及白寬中發汗功過於白秦艽味苦辛平性微溫無毒可升可降陰中之陽也其用有二除四肢風濕若懈療遍體黃疸如金白殭蠶味鹹辛平性微溫無毒升也陰中之陰也其用有二去皮膚風動如蟲行主面部黑生如漆點白豆蔻味辛性溫無毒升也陽也其用有四破肺中滯氣退目中雲氣散胸中冷氣補上焦元氣地榆味苦甘酸性微寒無毒沉也陰也其用有二主下部積熱之血痢止下焦不禁之月經連翹味苦平性微寒無毒升也陰也其用有二瀉諸經之客熱散諸腫之瘡瘍阿膠味甘平性微溫無毒降也陽也其用有四保肺益金之氣止嗽蠲咳之膿補虛安妊之胎治痿強骨之力桃仁味苦甘平性寒無毒降也陰也其用有二潤大腸血祕之便難破大腸久蓄之血結生薑味辛性溫無毒升也陽也其用有四製半夏有解毒之功佐大棗有厚腸之益溫經散表邪之風益氣止翻胃之噦石膏味辛甘性大寒無毒沉也陰也其用有二制火邪清肺氣仲景有白虎之名除胃熱奪其食易老云大寒之劑桂味辛性熱有毒浮也陽中之陽也氣之薄者桂枝也氣之厚者肉桂也氣薄則發泄桂枝上行而發表氣厚則發熱肉桂下行而補腎此天地親上親下之道也細辛味辛性溫無毒升也陽也其用有二止少陰合病之首痛散三陽數變之風邪梔子味苦性大寒無毒沉也陰也其用有三療心中懊憹顛倒而不得眠治臍下血滯小便而不得利易老云輕飄而象肺色赤而象火又能瀉肺中之火葛根味甘平性寒無毒可升可降陽中之陰也其用有四發傷寒之表邪止胃虛之消渴解中酒之苛毒治往來之溫瘧瓜蔞根味苦性寒無毒沉也陰也其用有二止渴退煩熱補虛通月經豬苓味淡甘平性溫無毒降也陽中之陰也其用有二除濕腫體用兼備利小水氣味俱長乾薑生則味辛炮則味苦可升可降陽也其用有二生則逐寒邪而發表炮則除胃冷而溫中草龍膽味苦性寒無毒沉也陰也其用有二退肝經之邪熱作下焦之濕腫蘇木味鹹平性寒無毒可升可降陰也其用有二破瘡瘍死血非此無功除産後敗血有此立驗杜仲味辛甘平性溫無毒降也陽也其用有二強志壯筋骨滋腎止腰疼酥炙去其絲功效如神應天門冬味苦辛性大寒無毒升也陰也其用有二保肺氣不被熱擾定喘促陡得康寧麥門冬味甘平性寒無毒降也陽中之陰也其用有四退肺中隱伏之火生肺中不足之金止燥渴陰得其養補虛勞熱不能侵木通味甘平性寒無毒降也陽中之陰也其用有二瀉小腸火積而不散利小便熱閉而不通瀉小腸火無他藥可比利小便閉與琥珀同功地骨皮味苦平性寒無毒升也陰也其用有二療在表無定之風邪主傳尸有汗之骨蒸桑白皮味甘性寒無毒可升可降陽中之陰也其用有二益元氣不足而補虛瀉肺氣有餘而止咳甘菊味苦甘平性微寒無毒可升可降陰中之陽也其用有二散八風上注之頭眩止兩目欲脫之淚出紅花味辛性溫無毒陽也其用有四逐腹中惡血而補血虛之虛除産後敗血而止血暈之暈赤石脂味甘酸性溫無毒降也陽中之陰也其用有二固腸胃有收斂之能下胎衣無推蕩之峻通草味甘平性微寒無毒降也陽中之陰也其用有二陰竅澀而不利水腫閉而不行澀閉兩俱立驗因有通草之名烏梅味酸平性溫無毒可升可降陰也其用有二收肺氣除煩止渴主泄痢調胃和中川椒味辛性大熱有毒浮也陽中之陽也其用有二用之於上退兩目之翳膜用之於下除六腑之沉寒萎蕤味甘平性溫無毒降也陽中之陰也其用有四風淫四末不用淚出兩目眥爛男子濕注腰疼女子面斑黑點秦皮味苦性寒無毒升也陽也其用有四風寒濕合而成痹青白幻翳遮睛女子崩中帶下小兒風熱癇驚白頭翁味苦性溫無毒可升可降陰中之陽也其用有四傳男子陰疝偏腫治小兒頭禿膻腥鼻衄血無此不效痢赤毒有此獲功牡蠣味鹹平性寒無毒可升可降陰也其用有四男子夢寐遺精女子赤白崩中榮衛往來虛熱便滑大小腸同乾漆味辛平性溫有毒降也陽中之陰也其用有二削年深堅結之沉積破日久祕結之瘀血南星味苦辛性溫有毒可升可降陰中之陽也其用有二墜中風不省之痰涎主破傷如尸之身強商陸味酸辛平性寒有毒降也陽中之陰也其味酸辛其形類人其用療水其效如神葶藶味苦性寒無毒沉也陰中之陰也其用有四除遍身之浮腫逐膀胱之留熱定肺氣之喘促療積飲之痰厥海藻味鹹性寒無毒沉也陰中之陰也其用有二利水道通閉結之便泄水氣消遍身之腫竹葉味辛苦平性寒無毒可升可降陽中之陰也其用有二除新舊風邪之煩熱止喘促氣勝之上衝蔥白味辛性溫無毒升也陽也其用有二散傷風陽明頭痛之邪止傷寒陽明下痢之苦天麻味辛平性溫無毒降也陽也其用有四療大人風熱頭眩治小兒風癇驚悸祛諸風麻痹不仁主癱瘓語言不遂大棗味甘平性溫無毒降也陽也其用有二助脈強神大和脾胃威靈仙味苦性溫無毒可升可降陰中之陽也其用有四推腹中新舊之滯消胸中痰唾之痞散苛癢皮膚之風利冷疼腰膝之氣鼠黏子味辛平性微寒無毒降也陽也其用有四主風濕癮疹盈肌退風熱咽喉不利散諸種瘡瘍之毒利凝滯腰膝之氣草豆蔻味辛性溫無毒浮也陽也其用有二去脾胃積滯之邪止心腹新舊之疼痛玄胡索味苦辛性溫無毒可升可降陰中之陽也其用有二活精血療産後之疾調月水主胎前之證東垣報使太陽羌活黃柏陽明白芷升麻石膏少陽柴胡青皮太陰白芍藥少陰知母厥陰青皮柴胡小腸膀胱屬太陽藁本羌活是本方三焦膽與肝包絡少陽厥陰柴胡強陽明大腸兼足胃葛根白芷升麻當太陰肺脈中焦起白芷升麻蔥白鄉脾經少與肺經異升麻芍藥白芷詳少陰心經獨活主腎經獨活加桂良通經用此藥為使更有何病到膏肓十八劑第九輕劑通聖散治風熱結憎寒發熱筋脈攣痹肢體焦痿頭目昏眩耳鳴鼻塞口苦舌乾咽喉不利涕唾稠黏咳嗽上氣腸胃燥澀便血瘀血瘡瘍腫痛咳瘧不痊婦人産後血滯腹痛小兒驚風積熱並墜馬跌僕疼痛或傷寒傷風等證並皆治之防風芒硝連翹川芎麻黃薄荷白芍藥當歸大黃各五錢黃芩桔梗石膏各一兩甘草一兩荊芥山梔白朮各一錢滑石一兩上為㕮咀每服一兩重或二兩重水二盞生薑三片同煎七分去渣溫服不拘時候如發散風寒加蔥白三莖如治痰嗽每服加半夏少許清劑涼膈散治心火上盛膈熱有餘目赤頭眩口瘡唇裂鼻衄吐血咳嗽痰涎淋閉不利大小便不通或傷寒半表半裡及胃熱發斑及陰耗陽竭用以養陰退陽或汗下後餘熱不解並小兒瘡痘黑陷並皆治之連翹一兩甘草山梔黃芩大黃薄荷各三錢朴硝一分上為㕮咀每服一兩水一鍾竹葉三十片同煎七分去渣入生蜜少許食後溫服加黃連五錢名清心湯暑劑白虎湯治傷寒陽明經頭痛自汗不惡寒或中暑頭痛自汗背惡寒及小兒痘瘡夏月極熱熱生喘促宜預服之知母五錢一兩石膏末四兩甘草一兩粳米一合上為㕮咀每服一兩水一鍾煎至七分去渣溫服不拘時候或傷寒脈浮自汗表不解每服加蒼朮一撮名蒼朮白虎湯火劑解毒湯治傷寒大熱狂躁喘滿譫語目赤及陽厥極深脈微身冷與濕熱下痢並宜服之黃連黃柏黃芩山梔各等分上為㕮咀每服一兩水一鍾煎至七分去渣溫服不拘時候或傷寒腹滿嘔逆加半夏白茯苓厚朴各少許名半夏黃連解毒湯又名既濟湯解劑小柴胡湯治傷寒往來寒熱胸脅痞痛口苦舌乾耳聾乾嘔或汗後餘熱不解及婦人産後潮熱並皆治之柴胡二兩黃芩一兩人參五錢甘草五錢半夏三分上為㕮咀每服一兩水二盞生薑三片棗二枚同煎至七分去渣溫服不拘時候甘劑五苓散治傷寒脈浮表不解小便不利身微熱或痞而下利或痞而淋澀及一切濕熱泄瀉霍亂並宜服之澤瀉豬苓白朮白茯苓各五錢官桂一分上為㕮咀每服一兩水二盞煎至七分去渣溫服或為細末白湯調服亦可淡劑天水散治傷寒表裡俱熱煩渴口乾小便不通及霍亂吐瀉下利腸澼偏主石淋及婦人産難催生下乳神仙之妙藥也桂府滑石膩白者六兩粉草一兩研爛上為極細末每服三錢白湯調下新水亦得加薄荷末少許名雞蘇散加青黛末少許名碧玉散治療並同但以回避世俗之輕侮爾緩劑大柴胡湯治傷寒表裡俱熱甚陽明經少陰經證微下之藥也柴胡大黃各一兩枳實麥炒半夏制赤芍藥黃芩各五錢上為㕮咀每服一兩半水二盞生薑三片棗二枚煎至七分去渣溫服不拘時候寒劑大承氣湯治傷寒里證悉具或狂妄腹滿實痛燥糞不通急下之劑也大黃芒硝各半兩枳實厚朴各錢半上為㕮咀分作二服水二盞生薑五片煎至七分去渣入芒硝再煎一二沸溫服不拘時候未利再服次劑調劑調胃承氣湯治傷寒陽明經裡熱甚譫語或協熱下利此緩下之劑也大黃芒硝甘草各三錢上為㕮咀水一鍾煎至七分去渣溫服不拘時候奪劑加減三黃丸治積熱風熱燥熱酒毒熱瘧疾熱瘡疥熱此藥推陳致新宣通氣血大黃黃芩各二兩黑牽牛取頭末滑石各四兩黃連川芎薄荷各半兩上先碾牽牛為末別碾余藥同和勻滴水為丸或煉蜜為丸如桐子大每服三十丸溫水下食後或臨臥服溫劑三花神祐丸治濕熱腫滿腹脹燥熱腸垢不通風熱瘡疥不已或久瘧或癥瘕或下利或疝氣並皆治之甘遂麵裹漿水煮芫花醋拌炒大戟各五錢黑牽牛取頭末大黃各三兩上除牽牛外別碾余藥和勻滴水為丸每服二十丸溫水下臨臥服補劑防風當歸飲治心火上盛腎水下虛往來寒熱怯弱不耐飲食減少柴胡黃芩人參甘草當歸白芍藥大黃各一兩滑石二兩上為㕮咀每服一兩水二盞生薑三片同煎七分去渣溫服不拘時候平劑四君子湯治虛人氣弱飲食不進嬰兒弱其胃氣吐乳人參白朮白茯苓甘草各半兩上為㕮咀每服一兩水一盞半煎七分去渣溫服不拘時候或為細末白湯調服亦妙加藿香扁豆尤佳榮劑四物湯治婦人經水不調或來多而在月前或來少而在月後或胎前孕動不安或産後腹痛不止此婦人之仙藥也當歸白芍藥川芎熟地黃各等分上為㕮咀每服一兩水一盞煎七分去渣食前空心溫服一曰春二曰頭痛三曰脈弦加川芎一倍一曰夏二日腹痛三曰脈洪加白芍藥一倍一曰秋二曰血少三曰脈澀加當歸一倍一曰冬二曰少精三曰脈微加熟地黃一倍澀劑胃風湯一名燥丹治風寒入胃腸鳴腹痛泄瀉不止人參白朮白茯苓當歸白芍川芎各等分官桂少許上為㕮咀每服一兩水一鍾入粟米一撮生薑三片棗二枚同煎七分去渣空心或食前溫服和劑平胃散治飲食失節飢飽失時四肢困倦口吐酸水嘔逆噁心面黃肌瘦蒼朮二兩米泔水浸一宿厚朴薑製陳皮甘草各一兩上為㕮咀每服一兩水二鍾生薑三片棗二枚同煎七分去渣溫服不拘時候溫劑理中湯治因冷過多胃脘當心而痛泄瀉清穀人參白朮乾薑泡甘草炙各等分上為㕮咀每服一兩水一鍾煎七分去渣溫服不拘時候雙解散治傷寒傷風或有汗或無汗表證悉具內熱口乾通聖天水各一半上為㕮咀每服二兩水二大鐘生薑三片蔥白三根同煎七分去渣微熱服以取其汗補中益氣湯治飢飽勞役四肢無力百節痠疼身熱頭痛口淡失味黃耆人參甘草炙當歸白芍藥升麻柴胡橘皮黃芩葛根黃柏白朮青皮生甘草稍各等分上為㕮咀每服一兩半水二盞生薑三片棗二枚同煎七分去渣溫服以取微汗一承氣湯治傷寒大承氣湯證腹滿實痛調胃承氣證譫語下利小承氣湯證內熱不便三乙承氣湯合而為一也及治中風僵仆風癇發作並皆服之此下劑也大黃芒硝各一兩厚朴枳實一兩甘草五錢上為㕮咀分作三服每服水二盞生薑三片同煎七分去渣溫服不拘時候以利為度半夏橘皮湯治一切嘔吐不止人參白朮白茯苓甘草黃芩半夏厚朴藿香葉葛根橘皮各等分上為㕮咀每服一兩水一碗煎七分去渣入生薑自然汁少許溫服不拘時候白朮調中湯治傷寒冷物過多以致陰盛陽衰上下所出水液澄徹清冷手足厥逆心腹皆痛澤瀉白茯苓白朮各一兩乾薑泡官桂砂仁陳皮藿香葉甘草各半兩上為㕮咀每服一兩半水二盞煎七分去渣溫服不拘時候或為細末白湯調服亦可若煉蜜為丸如彈子大細嚼用白湯下名白朮調中丸香薷湯治中暑身熱自汗頭痛噁心香薷一兩厚朴白扁豆各五錢黃連二錢五分上為㕮咀水一鍾入酒少許同煎七分去渣冷服不拘時候茵陳蒿湯治傷寒濕熱發黃身如橘皮色大小便不利茵陳蒿二兩大黃五錢山梔子二錢半上為㕮咀作一服水二大盞煎七分去渣溫服以利為度桃仁承氣治傷寒瘀血大便黑小便利小腹脹滿大黃芒硝甘草各二錢當歸尾桃仁各二錢上為㕮咀作一服水一鍾煎七分去渣溫服以血下為度當歸玉燭散治婦人經水熱結不通當歸赤芍藥川芎生地黃各五錢大黃芒硝甘草各一兩上為㕮咀每服一兩半水二鍾先煎余藥次下芒硝再煎一二沸空心熱服木香導氣丸治心火上盛腎水下虛氣血壅滯肢體憔悴面色痿黃胸膈痞悶婦人經候不調小兒疳疾乳癖並宜服之木香檳榔青皮廣朮黃連各五錢黃柏一兩半香附三兩大黃一兩半枳殼一兩黑牽牛四兩取頭末上為細末滴水為丸如桐子大每服五十丸溫水下不拘時候柴胡飲子治傷寒後餘熱及婦人産後蒸熱男子骨蒸潮熱並宜服之柴胡黃芩人參甘草當歸白芍藥産後減芍藥加生地黃大黃各等分上為㕮咀每服一兩水一鍾生薑三片同煎七分去渣溫服不拘時候小承氣湯治傷寒日深恐有燥糞欲知之法少服小承氣湯腸中轉失氣者必有燥糞乃可攻之此和胃氣之藥也枳實厚朴大黃各等分上為㕮咀每服半兩水一盞生薑三片同煎七分去渣不拘時候溫服消滯丸消酒進食寬中利膈黑牽牛半斤炒取頭末四兩香附子五靈脂炒各二兩上為細末醋糊為丸桐子大每服三十丸食後生薑湯送下禹攻散治一切水濕疝氣黑牽牛末一兩茴香炒半兩上為細末每服五錢生薑湯調下臨臥服羌活愈風湯羌活甘草蔓荊子防風川芎細辛枳殼人參麻黃薄荷枸杞當歸知母地骨皮黃耆獨活杜仲白芷秦艽柴胡半夏前胡厚朴熟地黃防己各二兩白芍藥黃芩各三兩石膏四兩蒼朮四兩生地黃四兩官桂一兩白茯苓三兩一方加寄生陳皮白茯苓三兩赤茯苓藁本青皮天麻牛膝赤芍藥桔梗大黃上各等分每服二兩水二鍾天陰加生薑三片同煎七分去渣溫服不拘時候如欲發汗加麻黃一倍如欲利加大黃一倍如虛風群藥二沸入常酒半鍾如寒濕之氣疼痛亦加酒半鍾空心食前一服臨臥一服風證早晨服寒濕氣臨臥服微汗為度獨活寄生湯獨活二兩寄生杜仲細炒牛膝曬乾酒浸半日秦艽當歸白芍藥川芎熟地黃官桂細辛茯苓防風甘草人參各一兩上為㕮咀每服一兩半水二鍾生薑三片同煎七分去渣微熱服不拘時候轉舌膏治中風舌謇不語清劑加菖蒲遠志各少許上為細末煉蜜為丸如櫻桃大硃砂為衣每服三五丸用薄荷湯化開或食後或臨臥或食遠服活命金丹治中風神不清清劑加青黛藍根各一兩上為細末煉蜜為丸如彈子大硃砂為衣外加金箔每服一丸用茶清化開食後或臨臥服小陷胸湯治傷寒心下滿痛名曰小結胸瓜蔞子半枚帶子挫碎生半夏三枚黃連二錢生薑三錢上用水一大碗煎瓜蔞實取汁半碗後下余藥再煎三四沸去渣溫服不拘時候大陷胸湯治傷寒從心下至小腹堅滿硬痛名曰大結胸大黃芒硝各半兩生甘遂末少許上用水一大碗先煎大黃甘遂次下芒硝取半碗分作二處先服一半以利為度未利再服非明瞭醫士未敢用此藥也三黃瀉心湯治心經熱大黃黃芩黃連各等分上為㕮咀每服三錢水一盞煎七分去渣食後溫服寧肺散治一切寒嗽罌粟殼不拘多少甘草乾薑當歸白礬陳皮上為細末每服三錢用烏梅三個煎薤汁半盞臨臥調服如神丸治一切癇病代赭石一兩白礬半兩上為細末用糯米粥為丸如桐子大每服三十丸用溫米飲湯食後送下延壽丹治一切筋攣骨痛濕之疾草烏頭炮製一兩蒼朮二兩小茴香炒三兩上為細末酒打麵糊為丸每服三十丸如桐子大每服五十丸如豌豆大用鹽酒空心下以乾物壓之忌食熱物清解散治一切感冒蒼朮炒二兩荊芥二兩甘草一兩麻黃一兩半上為㕮咀每服一兩半水二鍾生薑三片蔥白一莖同煎七分去渣微熱服以被蓋覆取汗為度不拘時候如意通聖散治風濕走注疼痛罌粟殼丁香皮麻黃防風當歸川芎甘草各等分上為㕮咀每服一兩半炒令黃色水二鍾煎七分去渣入研細乳香沒藥二味各少許再煎一沸微熱服以被蓋覆取汁為度不拘時候大橘皮湯治一切濕熱腫滿小便赤澀大便泄瀉心腹痞悶五苓天水各半兩木香檳榔陳皮各一撮上為㕮咀水二鍾生薑三片同煎七分去渣溫服不拘時候三化湯治中風大便不通小承氣一兩羌活二錢上為㕮咀水二鍾生薑三片同煎七分去渣溫服不拘時候以利為度玄青丸治大人小兒一切痢疾濕劑加黃連黃柏青黛各五錢上為細末滴水為丸如緑豆大每服十五丸溫水下在食前空心如治小兒丸如麻子大每服十丸量歲用之芍藥柏皮丸治一切血痢黃連黃柏當歸白芍藥各等分上為細末麵糊為丸如桐子大每服百丸溫水食前送下大金花丸火劑不拘多少加大黃上為細末麵糊為丸如桐子大每服五十丸溫水下食後或臨臥服搜風丸治一切痰實人參白朮白茯苓南星半夏白礬各五錢薄荷蛤粉寒水石藿香各三錢黃芩二兩大黃滑石黑牽牛半斤取頭末四兩乾薑四錢上為細末滴水為丸如桐子大每服三十丸食後生薑湯下琥珀散治經水不調穿山甲灰火內泡五錢當歸尾焙蒲黃三錢辰砂一分上㕮咀碾為細末每服三錢空心溫酒調下八正散治小便不通兼悶瞿麥萹蓄木通車前山梔大黃甘草滑石各等分上為㕮咀每服一兩半水二鍾燈心三十莖同煎七分去渣食前溫服珍珠粉丸治脫滑精氣黃柏二兩蛤粉一兩炒上為細末麵糊為丸如桐子大每服百丸空心鹽湯下封髓還元丹治脫滑精氣黃柏二兩砂仁甘草各五錢上為細末麵糊為丸每服五十丸如桐子大每服百丸如緑豆大空心鹽湯下瓜蒂散治中風牙關緊急及風癇病之吐劑瓜蒂赤小豆各等分上為細末每用半錢強壯人一錢用白湯調下不拘時候不吐者以薤汁半盞頓服以雞翎探之吐不止者以麝香湯止之便毒發腫知母貝母黑牽牛天花粉穿山甲威靈仙上水酒煎服
